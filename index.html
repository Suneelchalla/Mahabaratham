const STORY={
1:[
{t:'The River and the King',txt:'<p>Long ago, in the city of Hastinapura, there ruled a king named Shantanu — handsome, just, and beloved by his people. One day, while walking along the banks of the Ganga, he saw a woman of extraordinary beauty. She was the river goddess herself, Ganga, in human form.</p><p>Shantanu was struck with love. He begged her to be his queen. Ganga agreed, but with one condition: "You must never question anything I do. The moment you question me, I will leave you forever."</p><p>Shantanu agreed. They married and were happy. But then Ganga began drowning their newborn children in the river, one after another. Seven sons she drowned. Shantanu watched in silent horror, bound by his promise.</p><p>When the eighth son was born, Shantanu could bear it no longer. "Stop!" he cried. "What kind of mother destroys her own children?"</p><p>Ganga looked at him sadly. "You have broken your promise. These children were the Vasus — celestial beings cursed to be born as mortals. I was freeing them. This eighth son will live — but I must leave you now."</p><p>She named the boy Devavrata and raised him in the heavens, teaching him the arts of war and governance. When he returned to Hastinapura, he was the most accomplished prince the world had ever seen.</p>'},
{t:'The Terrible Oath',txt:'<p>Years later, Shantanu fell in love again — this time with Satyavati, a fisherman\'s daughter. But her father had a condition: Satyavati\'s sons must inherit the throne, not Devavrata.</p><p>When Devavrata learned of this, he went to the fisherman and made a vow that shook the heavens: "I renounce the throne forever. I will never marry. I will never have children. Satyavati\'s descendants alone shall rule."</p><p>The gods showered flowers from the sky. From that day, Devavrata was known as Bhishma — "the one who took the terrible oath." It was the single most consequential promise in the entire epic. Because Bhishma never married, because he never had heirs, the line of succession fractured — and from that fracture, everything that followed was born.</p><p>Shantanu, moved by his son\'s sacrifice, blessed him with Iccha Mrityu — the power to choose the moment of his own death. Bhishma would live as long as he wished. No one could kill him without his consent.</p>'},
{t:'The Next Generation',txt:'<p>Satyavati bore Shantanu two sons, but both died young. The Kuru dynasty faced extinction. In desperation, Satyavati called upon her own secret son — Vyasa, the sage, born from her union with the wandering sage Parashara before her marriage.</p><p>Vyasa was asked to father children with the widowed queens through the ancient practice of niyoga. From Ambika, who closed her eyes in fear at his appearance, was born Dhritarashtra — blind from birth. From Ambalika, who turned pale, was born Pandu — sickly and pale. From a maid who received Vyasa calmly, was born Vidura — wise and virtuous, but ineligible for the throne due to his mother\'s status.</p><p>Dhritarashtra, though the eldest, was denied the throne because of his blindness. Pandu became king. But Pandu too was cursed — a sage he accidentally killed while hunting cursed him: "The moment you embrace your wife in passion, you will die."</p><p>Pandu retired to the forest with his two wives, Kunti and Madri. The throne passed to the blind Dhritarashtra. The seeds of all future conflict were now planted.</p>'},
{t:'The Children of Gods',txt:'<p>In the forest, Kunti possessed a secret — a boon given to her by the sage Durvasa in her youth. She could invoke any god, and he would grant her a child with his divine qualities. She had already tested this once, as an unmarried girl, calling upon the Sun god. A son was born — radiant, wearing divine golden armor. Terrified of scandal, she had placed him in a basket and set him adrift on the river. That child, raised by a charioteer named Adhiratha, would grow up to be Karna.</p><p>Now, with Pandu\'s blessing, Kunti invoked three gods. From Dharma came Yudhishthira — truthful and just. From Vayu came Bhima — strong as a hurricane. From Indra came Arjuna — the greatest warrior. She shared the boon with Madri, who invoked the Ashwini twins and bore Nakula and Sahadeva.</p><p>Meanwhile, in Hastinapura, Gandhari — Dhritarashtra\'s wife, who had blindfolded herself to share her husband\'s blindness — gave birth to a hard mass of flesh. Vyasa divided it into 101 pieces. From these grew 100 sons, the Kauravas, led by the eldest, Duryodhana, and one daughter, Duhsala.</p><p>One hundred and five cousins. One throne. The stage was set.</p>'},
{t:'The Rivalry Begins',txt:'<p>When Pandu died (he embraced Madri, forgetting the curse), the Pandavas returned to Hastinapura with Kunti. They grew up alongside their hundred Kaurava cousins. The rivalry was immediate.</p><p>Bhima, the strongest boy alive, would bully the Kauravas. Duryodhana, the eldest Kaurava, burned with resentment. He once poisoned Bhima\'s food and threw his unconscious body into a river. Bhima survived — bitten by serpents whose venom only made him stronger.</p><p>The great teacher Drona arrived to train both sets of princes. He taught them archery, mace fighting, sword combat, and the use of celestial weapons. Arjuna became his favorite — the most dedicated, the most talented. When Arjuna asked to be the greatest archer in the world, Drona promised it.</p><p>Then came Ekalavya — a tribal boy who learned archery by practicing before a clay statue of Drona. When Drona discovered that Ekalavya\'s skill rivaled Arjuna\'s, he demanded the boy\'s right thumb as guru-dakshina. Ekalavya cut it off without hesitation. Drona\'s promise to Arjuna was kept — but at what cost?</p>'},
{t:'The Tournament and Draupadi',txt:'<p>At the great tournament to showcase the princes\' skills, Arjuna dazzled everyone. But then a young man strode into the arena — golden-armored, radiating the power of the sun. He matched every feat of Arjuna\'s. When asked his name and lineage, he was humiliated: "A charioteer\'s son cannot challenge a prince."</p><p>Duryodhana saw his opportunity. He crowned the stranger — Karna — king of Anga on the spot, giving him royal status and earning his undying loyalty. Karna and Duryodhana. The greatest friendship in the epic was forged that day, born of generosity in a moment of humiliation.</p><p>Later, at the swayamvara of Princess Draupadi, a near-impossible test was set: string a massive bow and shoot a revolving fish-target by looking only at its reflection in water below. Kings and princes failed. Karna was rejected for his caste. Then Arjuna, disguised as a Brahmin, stepped forward. He strung the bow, took aim, and pierced the target.</p><p>When the five brothers brought Draupadi home, Kunti — not looking — said, "Share equally whatever you have brought." And so Draupadi married all five Pandavas. The kingdom was divided: the Kauravas kept Hastinapura; the Pandavas built the magnificent Indraprastha.</p><p>But peace would not last.</p>'},
],
2:[
{t:'The Palace of Illusions',txt:'<p>At Indraprastha, the Pandavas built a court of unimaginable beauty with the help of Maya, the divine architect of the demons. The palace played tricks on the senses — crystal floors that looked like water, pools that looked like polished stone, doors that appeared to be walls.</p><p>After Yudhishthira performed the great Rajasuya sacrifice, declaring his supremacy over all kings, Duryodhana visited the magical palace. Walking through it, he mistook a crystal floor for a pool and lifted his garments. Then he stepped into an actual pool, thinking it was a floor, and fell in, drenched.</p><p>Someone laughed. The accounts differ on who — some say Draupadi, some say the servants, some say Bhima. But Duryodhana heard it. And in that moment, something crystallized inside him. He would destroy the Pandavas. Not just defeat them — destroy them utterly.</p>'},
{t:'The Game of Dice',txt:'<p>Shakuni, Duryodhana\'s uncle, was a master of the dice. The dice themselves were said to be carved from the bones of Shakuni\'s father. They obeyed his will. He proposed a "friendly" game.</p><p>Yudhishthira was invited to Hastinapura. Dharmaraja — the righteous king — had one weakness: he could not refuse a challenge. Round by round, Shakuni won. Yudhishthira lost his jewels, his gold, his chariots, his army, his kingdom.</p><p>Still he played. He staked his brothers — Nakula, Sahadeva, Arjuna, Bhima. Lost them all. He staked himself. Lost. And then, with nothing left, Shakuni whispered: "You still have one thing of value, O King."</p><p>Yudhishthira staked Draupadi.</p><p>And lost.</p>'},
{t:'The Question That Shook the World',txt:'<p>Duryodhana sent his brother Duhshasana to drag Draupadi from her chambers. She was in her period, wearing a single garment. Duhshasana seized her by the hair and dragged her into the full assembly hall — before Bhishma, Drona, Vidura, Dhritarashtra, and every elder of the court.</p><p>"She is our slave now," Duryodhana declared. He ordered Duhshasana to strip her.</p><p>Draupadi, standing alone in a hall full of powerful men who did nothing, asked one question that no one could answer: "If Yudhishthira had already lost himself, he was a slave. And a slave owns nothing. By what right, then, did he stake me?"</p><p>Silence. Bhishma — the most powerful man alive — said, "The path of dharma is subtle." Drona said nothing. Vidura protested but was silenced.</p><p>As Duhshasana pulled at her garment, Draupadi prayed to Krishna. Her sari became infinite — no matter how much Duhshasana pulled, there was always more. He collapsed from exhaustion.</p><p>Bhima rose and swore: "I will drink Duhshasana\'s blood. I will break Duryodhana\'s thigh. Or may I never reach heaven."</p><p>Dhritarashtra, frightened by the omens, offered Draupadi boons. She asked only for her husbands\' freedom. The Pandavas were exiled for thirteen years — twelve in the forest, one in disguise. If discovered during the thirteenth year, the exile would restart.</p><p>As they left, Draupadi unbound her hair and swore she would not bind it again until it was washed in Duhshasana\'s blood.</p><p>The war was now inevitable. It was only a matter of when.</p>'},
],
3:[
{t:'Into the Wilderness',txt:'<p>The Pandavas entered the forest with nothing — five brothers and one wife who had been a queen. The first years were hard. They lived on foraged food, slept on the ground, moved from forest to forest. But the exile became something unexpected: a time of learning, growth, and encounters with beings both mortal and divine.</p><p>Sages came to visit them. They told stories — of love and loss, of kings who gambled and queens who saved, of the nature of dharma and the mystery of death. These stories-within-stories are the hidden jewels of the Mahabharata, and this parva contains more of them than any other.</p>'},
{t:'Nala and Damayanti',txt:'<p>The sage Brihadasva told the Pandavas the story of King Nala — a man who, like Yudhishthira, lost everything to dice.</p><p>Nala was handsome and virtuous. Damayanti was the most beautiful princess alive. They fell in love through a swan who carried messages between them. At her swayamvara, even the gods Indra, Agni, Varuna, and Yama appeared in Nala\'s form to confuse her. But Damayanti recognized the real Nala — for only mortals blink, cast shadows, and touch the ground.</p><p>After their marriage, the demon Kali possessed Nala and drove him to gamble away his kingdom. Wandering in the forest, Nala abandoned the sleeping Damayanti and disappeared. For years they searched for each other — Nala transformed into a disfigured charioteer, Damayanti living as a servant in a foreign palace.</p><p>Finally, Damayanti devised a plan to find him. She recognized Nala by the way he cooked (he was a master chef) and by the way he controlled horses (no one drove a chariot like Nala). They were reunited, Kali was expelled, and Nala won back his kingdom in a rematch.</p><p>"You see," the sage told Yudhishthira, "your story is not new. Others have lost everything and won it back. Take heart."</p>'},
{t:'Savitri and Death',txt:'<p>Princess Savitri chose to marry Satyavan, a woodcutter\'s son, even after the sage Narada warned her: "He will die exactly one year from today."</p><p>Savitri married him anyway. She counted the days. On the final day, she followed Satyavan into the forest. As he chopped wood, he collapsed. Yama, the god of death, appeared — dark, carrying his noose — and drew Satyavan\'s soul from his body.</p><p>Savitri followed Yama. He told her to turn back. She refused. "Where my husband goes, I go."</p><p>Impressed by her devotion, Yama offered her boons — anything except Satyavan\'s life. She asked for her blind father-in-law\'s sight. Granted. For his lost kingdom. Granted. For a hundred sons for her own father. Granted.</p><p>Then she asked for a hundred sons for herself. Yama granted it — and then realized: she could not have sons if her husband was dead. He had been outwitted by a mortal woman.</p><p>Laughing, Yama released Satyavan\'s soul. Savitri is the only person in all of mythology to defeat Death through pure logic and devotion.</p>'},
{t:'The Yaksha\'s Riddles',txt:'<p>Near the end of the exile, the Pandavas stopped by a lake. Nakula went to drink and heard a voice: "Answer my questions first, or the water will poison you." He ignored it and drank. He fell dead.</p><p>Sahadeva went looking for him. Same warning, same result. Then Arjuna, then Bhima. All four brothers lay dead by the lake.</p><p>Yudhishthira arrived and saw his brothers. The voice spoke: "I am a Yaksha. This is my lake. Answer my questions and they will live."</p><p>The Yaksha asked: "What is heavier than the earth?" — "A mother." "What is taller than the sky?" — "A father." "What is faster than the wind?" — "The mind." "What is more numerous than grass?" — "Thoughts."</p><p>Then the deepest question: "What is the greatest wonder in the world?"</p><p>Yudhishthira answered: "Every day, beings die all around us. Yet the living believe they will live forever. There is no greater wonder than this."</p><p>The Yaksha was pleased. He offered to revive one brother. Yudhishthira chose Nakula — not Bhima or Arjuna, his strongest protectors, but Nakula, because Kunti had three living sons while Madri had none, and dharma demanded fairness to both mothers.</p><p>The Yaksha revealed himself as Dharma — Yudhishthira\'s own divine father. All brothers were revived. The exile was nearly over.</p>'},
],
4:[
{t:'The Year of Masks',txt:'<p>The twelve years of forest exile had ended, but the thirteenth year remained — the most dangerous. The Pandavas must live for one full year in disguise. If any Kaurava recognized them, the exile would restart from zero.</p><p>They chose the kingdom of Virata, a small but prosperous realm far from Hastinapura. Each Pandava assumed a new identity. Yudhishthira became Kanka, a Brahmin skilled at dice — an ironic disguise for the man who lost everything gambling. Bhima became Ballava, the royal cook, hiding his terrible strength behind pots and ladles. Nakula became a horse trainer. Sahadeva tended cattle.</p><p>And Arjuna? He became Brihannala — a eunuch dance teacher. During his time in Indra\'s heaven, the apsara Urvashi had cursed him to live as a eunuch for one year. What seemed a cruel punishment became the perfect disguise. No one would suspect the world\'s greatest warrior in the figure of a dance instructor teaching the princess Uttara.</p><p>Draupadi became Sairandhri, a handmaid to Queen Sudeshna. Even in disguise, her beauty drew dangerous attention.</p>'},
{t:'The Death of Kichaka',txt:'<p>Kichaka was Queen Sudeshna\'s brother and the true power behind Virata\'s throne — the kingdom\'s strongest warrior and its military commander. When he saw Draupadi, he became obsessed.</p><p>He pursued her relentlessly. Draupadi rejected him. He groped her in open court. She fell at King Virata\'s feet begging for protection, but the king — afraid of his own commander — did nothing. The pattern from the dice game repeated: a woman abused while powerful men watched.</p><p>But this time, Bhima was there.</p><p>Draupadi arranged a secret meeting between herself and Kichaka at the dance hall at midnight. Kichaka arrived, expecting her. Instead, he found Bhima sitting in the darkness.</p><p>What followed was not a fight. It was an execution. Bhima crushed Kichaka with his bare hands, mangling his body so completely that, as the text describes it, his limbs could not be distinguished from his torso. When the body was found, no one could explain how a mere handmaid\'s "gandharva husband" could possess such power.</p>'},
{t:'Arjuna Revealed',txt:'<p>The death of Kichaka had unintended consequences. He had been Virata\'s military backbone, and now the kingdom was vulnerable. The Kauravas, suspecting the Pandavas might be hiding in Virata, launched an attack — a massive cattle raid designed to provoke a response.</p><p>Virata\'s army marched out to meet them, but it was hopelessly outmatched. Young prince Uttara boasted he could defeat the Kauravas alone — if only he had a good charioteer. Brihannala, the dance teacher, volunteered.</p><p>When they reached the battlefield and Uttara saw the Kaurava army — Bhishma, Drona, Karna, Duryodhana, all arrayed for battle — the boy\'s courage evaporated. He tried to flee. Brihannala stopped the chariot.</p><p>And then Brihannala reached under the seat, pulled out the Gandiva bow hidden there, and removed the dance teacher\'s bangles. Arjuna stood revealed.</p><p>What followed was a masterclass. Single-handedly, Arjuna defeated the entire Kaurava army. He used the Sammohana astra to put them all to sleep — a deliberate mercy. The year of disguise was nearly over. There was no point in killing them yet.</p><p>When the Pandavas revealed their true identities, King Virata offered his daughter Uttara in marriage to Arjuna. Arjuna declined — she had been his student — but accepted her as a bride for his son Abhimanyu.</p>'},
],
5:[
{t:'The Last Ambassador',txt:'<p>The exile was over. The Pandavas demanded their kingdom back. Duryodhana refused.</p><p>Before war could be declared, one final attempt at peace had to be made. And so Krishna — god incarnate, king of Dwaraka, the most persuasive voice in the world — rode to Hastinapura as the Pandava ambassador.</p><p>His message was simple: Return Indraprastha. Or, if not, give just five villages — one for each Pandava brother. Five small villages to prevent a war that would kill millions.</p><p>Duryodhana\'s answer entered legend: "I will not give them land enough to place the point of a needle."</p><p>Krishna tried one last thing. In the open court, he revealed his Vishvarupa — the cosmic form, containing all of creation, all the gods, all of time. The court trembled. Dhritarashtra was temporarily granted sight to witness it.</p><p>It changed nothing. Duryodhana ordered Krishna arrested. Krishna laughed, resumed his divine form briefly — blinding the court with light — and walked out. War was now certain.</p>'},
{t:'A Mother\'s Plea',txt:'<p>Before leaving Hastinapura, Krishna visited one more person. Karna.</p><p>"You know the truth now," Krishna said. "You are Kunti\'s firstborn. You are the eldest Pandava. The throne is rightfully yours. Come to our side. Draupadi will be your queen. Five brothers will follow your command."</p><p>Karna listened. Then he refused. "Duryodhana gave me honor when the world gave me shame. I will not betray him. Not for a throne, not for the truth, not for anything."</p><p>Later that night, Kunti herself came to Karna — mother to the son she had abandoned at birth. She told him the truth of his origins. She wept. She begged him to come home to his brothers.</p><p>Karna wept too. But his answer was the same. "I cannot betray the one friend who stood by me when you did not."</p><p>He made her one promise: "I will not kill any Pandava except Arjuna. After the war, whether I live or he lives, you will still have five sons."</p><p>Kunti walked away with the knowledge that two of her sons would face each other on the battlefield, and she could save neither.</p>'},
],
6:[
{t:'Arjuna\'s Despair',txt:'<p>The armies were assembled. Seven Akshauhinis on the Pandava side, eleven on the Kaurava side. Each Akshauhini contained 21,870 chariots, 21,870 elephants, 65,610 cavalry, and 109,350 infantry. Nearly four million warriors stood on the field of Kurukshetra.</p><p>Arjuna asked Krishna to drive his chariot to the middle of the battlefield so he could see who he would be fighting. Krishna obliged.</p><p>And there, across the field, Arjuna saw them. Bhishma — his beloved grandfather who had bounced him on his knee. Drona — the teacher who had made him what he was. Kripa — his childhood instructor. Cousins. Uncles. Friends.</p><p>The Gandiva slipped from his hands. His body trembled. "I cannot do this," Arjuna whispered. "I would rather beg for my food than rule a kingdom won by killing my own family. What use is victory if everyone I love is dead?"</p><p>He sat down in his chariot and refused to fight.</p>'},
{t:'The Song of God',txt:'<p>What followed was the Bhagavad Gita — 700 verses, 18 chapters, spoken on a battlefield between two armies waiting to charge.</p><p>Krishna began gently: "You grieve for those who should not be grieved for. The wise grieve neither for the living nor the dead. The soul is eternal — it was never born and will never die. Weapons cannot cut it. Fire cannot burn it."</p><p>Then he taught the three paths: Karma Yoga — act without attachment to results. Jnana Yoga — understand the nature of reality. Bhakti Yoga — surrender to the divine with love.</p><p>"You are a warrior," Krishna said. "Your dharma is to fight. If you fight, you may win or lose. If you refuse to fight, you lose both duty and honor."</p><p>Arjuna asked to see Krishna\'s true form. What he saw overwhelmed him — the Vishvarupa, containing all of creation, all beings, all of time, all destruction. Millions of beings rushing into Krishna\'s mouths like rivers into the ocean. Past, present, and future all at once.</p><p>"I am Time," Krishna declared. "The destroyer of worlds. All these warriors are already dead. You are merely the instrument."</p><p>Finally, Krishna\'s ultimate teaching: "Abandon all varieties of dharma and simply surrender to me. I shall liberate you from all sins. Do not grieve."</p><p>Arjuna picked up the Gandiva. "My delusion is destroyed. I will do as you say."</p><p>The conch shells sounded. The war began.</p>'},
{t:'The Fall of Bhishma',txt:'<p>For ten days, Bhishma led the Kaurava army. He was devastating — an old man fighting like a god, his arrows falling like rain, cutting through the Pandava forces like a scythe through wheat.</p><p>But Bhishma had a secret. He was fighting with restraint. He had told Duryodhana plainly: "I will fight for you, but I will not kill the Pandavas." He was honoring his oath to protect the Kuru throne while simultaneously ensuring the throne\'s eventual passing to its rightful heirs.</p><p>On the night of the ninth day, the Pandavas came to Bhishma himself and asked: "Grandfather, how do we defeat you?"</p><p>Bhishma smiled. "Place someone before me whom I will not fight. I will not raise my bow against Shikhandi."</p><p>Shikhandi had been born as Amba — a princess whom Bhishma had once abducted. She had spent her entire life seeking revenge and had been reborn as a warrior for this purpose. Bhishma, bound by his principles, would not fight someone he regarded as a woman.</p><p>On the tenth day, Arjuna placed Shikhandi before his chariot and fired from behind. Arrow after arrow pierced Bhishma. The grandsire fell — but his body did not touch the ground. It rested on a bed of arrows, suspended between earth and sky.</p><p>"The sun is in the southern solstice," Bhishma said. "I will wait for Uttarayana to die." And there he lay, alive on his bed of arrows, for weeks — teaching, counseling, and waiting for the auspicious moment to release his soul.</p>'},
],
7:[
{t:'The Death of a Boy',txt:'<p>With Bhishma fallen, Drona took command of the Kaurava army. He was an even more aggressive commander — a Brahmin with none of Bhishma\'s restraint.</p><p>On Day 13, Drona deployed the Chakravyuha — a deadly spiral formation that rotated like a living labyrinth. Only two people knew how to both enter and exit it: Arjuna and Krishna. The Kauravas lured Arjuna to the far end of the battlefield with a suicide squad called the Samshaptakas.</p><p>With Arjuna away, someone had to breach the Chakravyuha or the Pandava army would be annihilated. Sixteen-year-old Abhimanyu stepped forward.</p><p>"I know how to enter," he said. "My father taught me in my mother\'s womb. I never learned the way out. But I can break in and create an opening for you to follow."</p><p>Abhimanyu entered the spinning formation. Behind him, Jayadratha — empowered by a boon from Shiva — single-handedly held the entrance shut, preventing any Pandava from following.</p><p>Inside, alone, Abhimanyu fought like a being possessed. He killed tens of thousands. He defeated warriors three times his age. When his bow broke, he fought with a sword. When his sword shattered, he fought with a chariot wheel.</p><p>Then six maharathis — Drona, Karna, Ashwatthama, Kripa, Kritavarma, and Shakuni — surrounded the disarmed boy and attacked simultaneously. Karna struck from behind, severing his bowstring. Others broke his shield, his armor.</p><p>Abhimanyu fell. He was sixteen years old.</p><p>When Arjuna returned and learned what had happened, the sound he made was not human. He swore: "Tomorrow, before the sun sets, I will kill Jayadratha. If I fail, I will walk into fire."</p>'},
{t:'The False Sunset',txt:'<p>Day 14 became the longest day of the war. Arjuna fought through the entire Kaurava army seeking Jayadratha, who was hidden behind seven protective formations. Layer after layer, Arjuna broke through them, killing thousands, his arrows guided by Krishna\'s strategy.</p><p>But as afternoon faded to evening, Jayadratha remained alive, protected deep in the Kaurava rear. The sun began to set. If it disappeared below the horizon, Arjuna would have to immolate himself.</p><p>Then Krishna acted. He used his divine power to create the appearance of sunset — clouds covered the sun, the sky darkened. Across the battlefield, warriors on both sides believed the day was over.</p><p>Jayadratha, who had been hiding behind shields of men, emerged in relief. He stepped forward to see Arjuna\'s funeral pyre.</p><p>Krishna cleared the sky. The sun blazed again — it had not truly set.</p><p>"Now," Krishna whispered.</p><p>Arjuna released the Pashupatastra. Jayadratha\'s head flew from his body. But Krishna had warned Arjuna: Jayadratha\'s father had placed a curse that whoever caused his son\'s head to fall to the ground would have their own head explode. So Arjuna guided the flying head with arrows, keeping it airborne, until it landed in the lap of Jayadratha\'s father — who was meditating nearby. The father, startled, dropped the head. His own head exploded.</p>'},
],
8:[
{t:'The Sun\'s Son Falls',txt:'<p>On Day 16, Karna finally took supreme command of the Kaurava army. The son of the Sun god, the man born with golden armor, the greatest rival Arjuna would ever face.</p><p>But Karna rode into battle under a weight of accumulated curses that no warrior could bear.</p><p>Years ago, he had lied to his teacher Parashurama, claiming to be a Brahmin when he was a Kshatriya. When Parashurama discovered the lie, he cursed Karna: "The supreme weapon I taught you — you will forget it at the moment you need it most."</p><p>A Brahmin whose cow Karna accidentally killed had cursed him: "Your chariot wheel will sink into the earth when you most need to move."</p><p>And Indra, Arjuna\'s divine father, had come to Karna disguised as a Brahmin and asked for his divine armor — the Kavach-Kundal he was born with, which made him invincible. Karna, who never refused a request, cut the armor from his own body and gave it away. In exchange, Indra gave him the Shakti — a one-use weapon guaranteed to kill any single person. Karna saved it for Arjuna.</p><p>But on the night of Day 14, Ghatotkacha — Bhima\'s demon son — went on a rampage so devastating that Duryodhana begged Karna to use the Shakti. Karna, bound by his promise to Duryodhana, used it on Ghatotkacha. His one chance to kill Arjuna was gone.</p><p>On Day 17, everything converged. The chariot wheel sank. The supreme weapons were forgotten. The Shakti was spent. Shalya, his own charioteer, whispered demoralizing words into his ear throughout the battle.</p><p>Karna appealed to Arjuna: "Wait — let me free my wheel. Dharma demands you do not attack a helpless warrior."</p><p>Krishna laughed. "Dharma? Where was dharma when you helped strip Draupadi? Where was dharma when you surrounded Abhimanyu? You speak of dharma now?"</p><p>Arjuna released the Anjalika arrow. Karna\'s head separated from his body.</p><p>The sun — Karna\'s father — dimmed. Light itself grieved.</p>'},
],
9:[
{t:'The Last Day',txt:'<p>Day 18. The Kaurava army was a remnant. Shalya, King of Madra, led what was left. By midday, Yudhishthira — the king who never fought with fury — hurled a javelin that killed Shalya. Sahadeva killed Shakuni, the architect of the dice game.</p><p>The Kaurava army dissolved. Duryodhana fled alone to a lake, sinking beneath the water, using yogic power to breathe, hiding from the death that had claimed everything he owned.</p><p>The Pandavas found him. Yudhishthira called out: "Come out and fight. Die like a king, not a coward."</p><p>Duryodhana rose from the water. He chose Bhima as his opponent. The mace duel.</p><p>For hours they fought — evenly matched. Both had trained under Balarama, Krishna\'s brother. Duryodhana was technically the better mace fighter. The duel could have gone either way.</p><p>Then Krishna caught Bhima\'s eye and slapped his own thigh. Bhima remembered his oath: "I will break Duryodhana\'s thigh."</p><p>He struck below the waist — an illegal blow in mace combat. Duryodhana\'s thigh shattered. He fell.</p><p>Balarama, arriving to witness the duel, was furious. "This is adharma! Bhima has cheated!" He raised his plow to kill Bhima, but Krishna restrained him.</p><p>Duryodhana, lying broken on the ground, spoke his last defiant words: "I have lived as a king, enjoyed all pleasures, ruled the world, and now I die on the battlefield like a warrior. What more could I ask? It is you, Pandavas, who must live with what you\'ve done."</p><p>He was not entirely wrong.</p>'},
],
10:[
{t:'The Night of Fury',txt:'<p>The war was over. But the killing was not.</p><p>Ashwatthama, son of Drona, found his father\'s killer — Dhrishtadyumna — sleeping in the Pandava camp. Something broke inside him. His father had laid down his arms. His father had surrendered. And they had cut off his head anyway.</p><p>In the dead of night, Ashwatthama entered the camp with Kripa and Kritavarma. What followed was not war. It was slaughter.</p><p>Dhrishtadyumna was strangled in his sleep. Shikhandi was beheaded. The five sons of Draupadi — young boys, sleeping peacefully — were murdered. Ashwatthama killed them thinking they were the five Pandavas. Thousands of sleeping soldiers were butchered.</p><p>The Pandavas survived only because they had camped elsewhere that night.</p><p>When Draupadi learned her five sons were dead, her grief was absolute. The Pandavas pursued Ashwatthama and found him by a riverbank. Cornered, he launched the Brahmastra — not at the warriors, but at the womb of Uttara, Abhimanyu\'s widow. He aimed to destroy the last heir of the Pandava line.</p><p>Krishna intervened, protecting the unborn child — Parikshit — who would one day rule the Kuru kingdom. Ashwatthama\'s divine jewel was ripped from his forehead, and he was cursed: to wander the earth for three thousand years, his wounds never healing, alone and forgotten.</p><p>Some say he still wanders.</p>'},
],
11:[
{t:'The Grief of Queens',txt:'<p>The war was over. 1.66 billion warriors lay dead — the text\'s own number. The women of Hastinapura walked the battlefield.</p><p>Gandhari came. She who had blindfolded herself for her husband\'s blindness. She who had borne a hundred sons. Now she walked among the dead, touching face after face, recognizing each son by feel alone. One hundred dead sons.</p><p>Her grief turned to fury — and she directed it at the one person she held responsible. "Krishna," she said, "you could have prevented this. You had the power to stop this war. You chose not to."</p><p>"I curse you. Your Yadava clan will destroy itself — just as the Kurus have. And you will die alone, in an ignoble way, killed by a common hunter."</p><p>Krishna smiled sadly. "I accept your curse, Mother. It is just."</p><p>Thirty-six years later, every word came true.</p><p>Then Kunti spoke. She told her sons — told Yudhishthira, Bhima, Arjuna — the secret she had carried for a lifetime. "Karna was my son. My firstborn. Your eldest brother. You killed your own brother."</p><p>The silence that followed was worse than anything the war had produced.</p>'},
],
12:[
{t:'The Dying Teacher',txt:'<p>Bhishma still lay on his bed of arrows, alive, waiting for the winter solstice. Yudhishthira came to him — not as a king to a fallen enemy commander, but as a grandson to his grandfather.</p><p>"I have won," Yudhishthira said, "but I feel no victory. Millions are dead because of me. How do I rule? How do I live with what I have done?"</p><p>What followed was the longest sustained teaching in the entire epic — and possibly in all of ancient literature. Bhishma taught Yudhishthira everything: the duties of kings, the nature of justice, the principles of taxation, the treatment of subjects, the ethics of warfare, the meaning of dharma in impossible situations.</p><p>He taught the Vishnu Sahasranama — the thousand names of God. He taught the nature of the soul and its relationship to the cosmos. He covered charity, truth, non-violence, and the four stages of human life.</p><p>All of this from a man lying on a bed of arrows, his body pierced by hundreds of shafts, sustained only by willpower and the boon of choosing his death.</p><p>When the sun finally turned northward — Uttarayana — Bhishma closed his eyes. His soul departed through the crown of his head, as yogis do. The man who had sacrificed everything for a dynasty watched that dynasty nearly destroy itself, then taught its sole survivor how to rebuild.</p>'},
],
13:[{t:'Bhishma\'s Farewell',txt:'<p>Before he departed, Bhishma spoke of what matters most at the end of a life: not power, not victory, not even knowledge — but the quality of one\'s conduct. A life lived in dharma, he said, even a simple one, outweighs all the conquests of all the kings who ever lived.</p><p>He spoke of dana — giving — as the highest act. Not giving from surplus, but giving from need. He told the story of the mongoose whose body was half golden, who came to Yudhishthira\'s great sacrifice and declared that a poor family\'s gift of their last meal to a starving guest was worth more than all the gold and ceremony in the world.</p><p>"I have seen everything," Bhishma whispered at the end. "I have lived longer than any mortal should. And I tell you this: the path is simple. Be kind. Be truthful. Protect those who need protection. The rest is commentary."</p><p>His eyes closed. His breath stopped. The arrows that held him dissolved. The greatest warrior the world had ever known finally found peace.</p>'}],
14:[{t:'The Horse and the Second Song',txt:'<p>Yudhishthira was king. But the crown sat heavy. Millions were dead. His own brother — Karna — among them. To establish his sovereignty and perform penance for the war, he undertook the Ashvamedha — the horse sacrifice.</p><p>A sacred horse was released to roam wherever it wished. Any king who stopped it would have to fight Arjuna, who followed the horse with an army. The horse wandered across Bharatavarsha, and Arjuna faced challenge after challenge — including, in one extraordinary episode, his own son Babhruvahana, who defeated him in combat.</p><p>During this journey, Arjuna asked Krishna to repeat the Bhagavad Gita. Krishna\'s answer was surprising: "I cannot. What I spoke on the battlefield came from a divine state. I cannot simply re-enter it on demand."</p><p>Instead, he offered the Anu Gita — a second, different discourse on the self, action, and the nature of reality. Quieter than the Gita, more contemplative. A teaching for peacetime rather than the brink of war.</p>'}],
15:[{t:'The Fire in the Forest',txt:'<p>Years passed. The kingdom prospered under Yudhishthira. But the old generation could not find peace in the palace.</p><p>Dhritarashtra — the blind king who had lost a hundred sons — could not bear the sounds of a court that had once been his. Gandhari, still wearing her blindfold, moved through corridors haunted by memories. Kunti carried the weight of secrets revealed too late.</p><p>Together, the three of them — along with Vidura and Sanjaya — retired to the forest to live as ascetics. Vidura, the wisest of the Kurus, died first. At the moment of his death, his soul merged with Yudhishthira\'s, for both were incarnations of Dharma.</p><p>One day, a forest fire broke out. Dhritarashtra, Gandhari, and Kunti sat in meditation as the flames approached. They did not run. They did not call for help. They let the fire take them.</p><p>Whether this was suicide, acceptance, or liberation depends on who tells the story. The Pandavas mourned — but understood. Some endings are chosen.</p>'}],
16:[{t:'The Curse Fulfilled',txt:'<p>Thirty-six years after the war, Gandhari\'s curse came due.</p><p>The Yadava clan — Krishna\'s own people, the greatest warriors of the western coast — gathered at the holy site of Prabhasa for a festival. They drank. They quarreled. Old resentments surfaced.</p><p>Years before, some young Yadavas had dressed one of their own as a pregnant woman and brought him before visiting sages, asking mockingly, "What child will she bear?" The insulted sages cursed: "She will bear an iron pestle that will destroy the Yadava race."</p><p>The pestle was ground to powder and thrown into the sea. But the powder washed ashore and grew as iron reeds along the coast.</p><p>Now, drunk and raging, the Yadavas pulled those reeds and used them as clubs. They killed each other — every last one. Krishna\'s own son, his grandson, his closest companions. The entire clan destroyed itself in a single afternoon.</p><p>Balarama, Krishna\'s brother, sat under a tree and departed through yoga.</p><p>Krishna sat alone in the forest, his foot resting on his knee. A hunter named Jara, seeing the sole of Krishna\'s foot through the bushes, mistook it for a deer and shot an arrow. It struck the one vulnerable spot on Krishna\'s body.</p><p>When Jara rushed forward in horror, Krishna smiled. "Do not grieve. This was meant to happen." He blessed the hunter and departed the mortal world.</p><p>Dwaraka, his golden city, sank beneath the ocean.</p>'}],
17:[{t:'The Last Walk',txt:'<p>When news of Krishna\'s death reached Hastinapura, the Pandavas knew their time in the world was over. Everything they had fought for — the kingdom, the dynasty, the dharma — all of it was passing away.</p><p>Yudhishthira crowned Parikshit, Abhimanyu\'s son, as king. Then the five brothers and Draupadi, dressed in bark and carrying nothing, began walking north — toward Mount Meru, the axis of the universe.</p><p>A stray dog joined them at the city gate.</p><p>As they walked, one by one, they fell.</p><p>Draupadi fell first. Bhima asked why. Yudhishthira answered without stopping: "She loved Arjuna more than the rest of us. That partiality was her flaw."</p><p>Sahadeva fell next. "He was proud of his wisdom." Then Nakula. "He was proud of his beauty." Then Arjuna — the great Arjuna. "He boasted he could defeat all enemies in a single day. He could not."</p><p>Then Bhima fell. "He ate too much, and boasted of his strength."</p><p>Yudhishthira walked on, alone except for the dog. He did not look back. He did not weep. To look back would be attachment. To weep would be weakness.</p><p>Each fall stripped away a companion, a comfort, a piece of his heart. The walk was not just physical — it was the final renunciation of everything he had ever loved.</p>'}],
18:[{t:'The Final Test',txt:'<p>At the gates of heaven, Indra himself appeared with a celestial chariot. "Come, Yudhishthira. You have earned your place. Enter heaven in your mortal body."</p><p>Yudhishthira moved toward the chariot. The dog followed.</p><p>Indra stopped him. "The dog cannot enter heaven. Leave it behind."</p><p>Yudhishthira refused. "This dog has followed me faithfully when everyone else fell. I will not abandon a loyal companion for my own comfort. If heaven has no place for loyalty, I have no need for heaven."</p><p>The dog transformed. It was Dharma — the god of righteousness, Yudhishthira\'s own divine father — in disguise. It had been the final test. And Yudhishthira had passed.</p><p>But heaven held one more surprise. Yudhishthira found Duryodhana sitting in glory. His brothers and Draupadi were nowhere to be seen. He was taken to hell — and there they were, suffering.</p><p>"I will stay here," Yudhishthira declared. "I choose hell with those I love over heaven with my enemies."</p><p>The illusion dissolved. It had been one last test — or perhaps a lesson. In truth, all of them were in heaven. The war, the suffering, the curses, the grief — all of it had been the play of karma and cosmic law. Everyone, in the end, had found their way home.</p><p>The story ends where it began: with the eternal question of what it means to live rightly in a world that makes righteousness nearly impossible.</p>'}],
};

let treeInfo=null;
function treeH(){
const W=680,rowH=90,padT=50,padB=60,H=padT+6*rowH+padB;
let svg=`<div class="sec-t au">The Kuru Dynasty</div><div class="sec-s au d1">Tap any name to learn about them.</div>
<div class="tree-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
// Draw links first
DYN_LINKS.forEach(([from,to,type])=>{
const a=DYNASTY.find(d=>d.id===from),b=DYNASTY.find(d=>d.id===to);if(!a||!b)return;
const x1=a.x/100*W,y1=padT+a.y*rowH+16,x2=b.x/100*W,y2=padT+b.y*rowH-4;
const color=type==='marriage'?'var(--kumkum)':'var(--earth-pale)';
const dash=type==='marriage'?'4,4':'none';
svg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="0.8" stroke-dasharray="${dash}" opacity="0.5"/>`;
});
// Draw nodes
DYNASTY.forEach(d=>{
const x=d.x/100*W,y=padT+d.y*rowH;
svg+=`<g class="tree-node" onclick="showTreeInfo('${d.id}')">
<rect x="${x-36}" y="${y-12}" width="72" height="26" rx="13" fill="${d.c}" opacity="0.9"/>
<text x="${x}" y="${y+3}" text-anchor="middle" font-size="10" font-weight="500" fill="#fff">${d.nm}</text></g>`;
});
svg+=`</svg></div><div id="treeInfoBox"></div><div style="height:20px"></div>`;
return svg;
}
function showTreeInfo(id){
const d=DYNASTY.find(x=>x.id===id);if(!d)return;
const box=document.getElementById('treeInfoBox');
const charLink=C.find(c=>c.n===d.nm)?`<button style="margin-top:10px;padding:8px 16px;background:var(--kumkum);color:#fff;border:none;border-radius:20px;font-size:12px;cursor:pointer;font-family:var(--f-body)" onclick="goToChar('${d.nm}')">View full profile →</button>`:'';
box.innerHTML=`<div class="tree-info"><div class="tree-info-name">${d.nm}</div><div class="tree-info-desc">${d.desc}</div>${charLink}</div>`;
box.scrollIntoView({behavior:'smooth',block:'nearest'});

// ===== YAKSHA PRASHNA =====
let ykState={q:0,correct:0,done:false,brothers:['N','S','A','B']};
function yakshaH(){
ykState={q:0,correct:0,done:false,brothers:['N','S','A','B']};
return`<div class="yk-scene">
<div style="text-align:center;animation:fadeUp 0.8s var(--ease) both">
<div style="font-family:var(--f-display);font-size:24px;font-weight:500;color:var(--text);margin-bottom:6px">The Yaksha Prashna</div>
<div style="font-size:13px;color:var(--text2)">Answer the riddles. Save your brothers.</div>
</div>
<div class="yk-narr" style="animation:fadeUp 0.8s 0.2s var(--ease) both">A cursed lake in the forest. One by one, your brothers drank without answering and fell dead. Now you stand before the water, and a voice speaks from the mist...</div>
<div class="yk-lake" style="animation:fadeUp 0.8s 0.4s var(--ease) both">
<div style="font-size:11px;color:var(--nila);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">Your brothers</div>
<div class="yk-brothers" id="ykBros">
<div class="yk-bro fallen" id="ykB0" style="background:var(--nila)" title="Nakula">N</div>
<div class="yk-bro fallen" id="ykB1" style="background:var(--nila)" title="Sahadeva">S</div>
<div class="yk-bro fallen" id="ykB2" style="background:var(--nila)" title="Arjuna">A</div>
<div class="yk-bro fallen" id="ykB3" style="background:var(--kumkum)" title="Bhima">B</div>
</div>
<div style="font-size:11px;color:var(--text3)" id="ykStatus">All four brothers lie dead</div>
</div>
<div id="ykBody">${ykQH()}</div>
</div>`}

function ykQH(){
const qi=ykState.q;
if(qi>=YAKSHA.length){
return`<div class="yk-result vis" style="animation:fadeUp 0.6s var(--ease) both">
<div style="font-size:40px;margin-bottom:12px">🕉️</div>
<div style="font-family:var(--f-display);font-size:22px;font-weight:500;color:var(--tulasi)">The Yaksha reveals himself</div>
<div style="font-size:14px;color:var(--text2);margin-top:10px;line-height:1.7">"I am Dharma — your father. You answered with wisdom and chose with righteousness. All your brothers are restored to life."</div>
<div style="font-size:13px;color:var(--text3);margin-top:12px">You answered ${ykState.correct} of ${YAKSHA.length} correctly.</div>
<button class="dice-btn" style="margin-top:20px" onclick="go('yaksha')">Play again</button>
</div>`}
const y=YAKSHA[qi];
return`<div class="yk-riddle" style="animation:scaleIn 0.5s var(--ease) both">
<div style="font-size:10px;color:var(--kumkum);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">Riddle ${qi+1} of ${YAKSHA.length}</div>
<div class="yk-q">"${y.q}"</div>
<div class="yk-opts" id="ykOpts">${y.opts.map((o,i)=>`<button class="yk-opt" onclick="ansYk(${i})">${o}</button>`).join('')}</div>
</div>`}

function ansYk(i){
if(ykState.done)return;ykState.done=true;
const y=YAKSHA[ykState.q];
document.querySelectorAll('.yk-opt').forEach((o,j)=>{
if(j===y.a)o.classList.add('right');
if(j===i&&i!==y.a)o.classList.add('wrong');
o.style.pointerEvents='none';
});
const isRight=i===y.a;
if(isRight)ykState.correct++;
// Revive a brother for correct answers (first 4)
if(isRight&&ykState.correct<=4){
const bro=document.getElementById('ykB'+(ykState.correct-1));
if(bro){bro.classList.remove('fallen');bro.classList.add('revived')}
const statusEl=document.getElementById('ykStatus');
const alive=ykState.correct;
statusEl.textContent=alive===4?'All brothers restored!':alive+' of 4 brothers revived';
}
// Show explanation
const expDiv=document.createElement('div');
expDiv.className='yk-narr';expDiv.style.marginTop='12px';
expDiv.innerHTML=(isRight?'<span style="color:var(--tulasi);font-weight:600">Correct.</span> ':'<span style="color:var(--rakta);font-weight:600">The Yaksha shakes his head.</span> ')+y.explain;
document.getElementById('ykOpts').after(expDiv);
if(audioOn)speak(y.explain);
// Next button
setTimeout(()=>{
const btn=document.createElement('button');
btn.className='rd-nav-btn primary';btn.style.marginTop='14px';btn.style.width='100%';
btn.textContent=ykState.q<YAKSHA.length-1?'Next riddle →':'See the revelation';
btn.onclick=()=>{ykState.q++;ykState.done=false;document.getElementById('ykBody').innerHTML=ykQH();
if(ykState.q>=YAKSHA.length){
// Revive all brothers at the end
for(let b=0;b<4;b++){const el=document.getElementById('ykB'+b);if(el){el.classList.remove('fallen');el.classList.add('revived')}}
document.getElementById('ykStatus').textContent='All brothers restored — Dharma reveals himself!';
}};
expDiv.after(btn);
},600);
}

function warH(){const dns=WD.map(d=>d.day);return`<div class="sec-s">18 days. 4 million warriors.</div>
<div class="wdays">${Array.from({length:18},(_,i)=>{const h=dns.includes(i+1),a=WD[wdi]?.day===i+1;return`<button class="wd ${a?'on':''} ${h?'has':''}" onclick="pickW(${i+1})">${i+1}</button>`}).join('')}</div>
<div id="wBody">${wdH(WD[wdi])}</div><div style="height:20px"></div>`}
function wdH(d){if(!d)return'<div style="padding:40px 20px;text-align:center;color:var(--text3);font-size:14px">Select a highlighted day.</div>';return`
<div style="padding:0 20px 12px" class="au"><div style="font-family:var(--f-display);font-size:22px;font-weight:500;color:var(--text)">Day ${d.day}</div><div style="font-size:12px;color:var(--text3);margin-top:3px">Commander: <span style="color:var(--nila)">${d.cp}</span> vs <span style="color:var(--rakta)">${d.ck}</span></div>
<button class="abtn" style="margin-top:8px" onclick="speak('Day ${d.day}. ${d.ev.map(e=>e.ti+'. '+e.d).join('. ')}')">🔊</button></div>
<div class="str-box au d1"><div class="str-lb">Army strength</div><div class="str-r"><span class="str-s p">Pandava</span><div class="str-tk"><div class="str-fl pf" style="width:${d.ps}%"></div></div><span class="str-pct">${d.ps}%</span></div><div class="str-r"><span class="str-s k">Kaurava</span><div class="str-tk"><div class="str-fl kf" style="width:${d.ks}%"></div></div><span class="str-pct">${d.ks}%</span></div></div>
${d.ev.map((e,i)=>`<div class="we au d${i+2}"><div class="we-t">${e.t}</div><div class="we-ti">${e.ti}</div><div class="we-d">${e.d}</div></div>`).join('')}`}
function pickW(n){const i=WD.findIndex(d=>d.day===n);if(i<0)return;wdi=i;document.querySelectorAll('.wd').forEach(b=>b.classList.toggle('on',parseInt(b.textContent)===n));document.getElementById('wBody').innerHTML=wdH(WD[i])}

function gitaH(){return`<div class="sec-s">700 verses. 18 chapters. The philosophical heart.</div>
${G.map((ch,i)=>`<div class="gch rv" style="transition-delay:${i*.03}s"><div class="gn">${ch.n}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px"><div class="gcn">${ch.nm}</div><button class="abtn" style="width:24px;height:24px;font-size:9px" onclick="event.stopPropagation();speak('Chapter ${ch.n}. ${ch.nm}. ${ch.d.substring(0,80)}')">🔊</button></div><div class="gcs">${ch.sk}</div><div class="gcd">${ch.d}</div><div class="gcv">${ch.v} verses · ${ch.mn}</div></div></div>`).join('')}<div style="height:20px"></div>`}

function diceH(){dSt={r:0,l:[],on:true};return`<div class="dice-scene" id="ds"><div class="dice-atm">The great hall grows quiet. Shakuni smiles.<br>The ivory dice gleam.</div>
<div class="dice-box" id="db"><div class="dice-rnd" id="drnd">Round 1 of 10</div><div class="dice-stk" id="dstk">${DR[0].stake}</div><div class="dice-sub">You must wager</div></div>
<div class="dice-area"><div class="die" id="d1">?</div><div class="die" id="d2">?</div></div>
<button class="dice-btn" id="dbtn" onclick="rollD()">Cast the dice</button>
<div id="ddlg"></div><div class="dice-lost" id="dlost"></div></div>`}
function rollD(){if(dSt.r>=DR.length)return;document.getElementById('dbtn').disabled=true;const d1=document.getElementById('d1'),d2=document.getElementById('d2');d1.classList.add('roll');d2.classList.add('roll');d1.textContent='?';d2.textContent='?';let r=0;const iv=setInterval(()=>{d1.textContent=Math.floor(Math.random()*6)+1;d2.textContent=Math.floor(Math.random()*6)+1;if(++r>10){clearInterval(iv);d1.classList.remove('roll');d2.classList.remove('roll');d1.textContent=Math.floor(Math.random()*3)+1;d2.textContent=Math.floor(Math.random()*3)+1;finD()}},70)}
function finD(){const rd=DR[dSt.r];dSt.l.push(rd.lost);document.getElementById('ddlg').innerHTML=`<div class="dice-dlg"><div class="dice-sp">${rd.sp}</div><div class="dice-qt">"${rd.qt}"</div></div>`;if(audioOn)speak(rd.qt);document.getElementById('dlost').innerHTML=dSt.l.map(l=>`<span class="dice-lt">${l}</span>`).join('');dSt.r++;const btn=document.getElementById('dbtn');if(dSt.r>=DR.length){btn.textContent='The game is over.';btn.disabled=true}else{document.getElementById('drnd').textContent=`Round ${dSt.r+1} of 10`;document.getElementById('dstk').textContent=DR[dSt.r].stake;btn.disabled=false;document.getElementById('ds').style.background=`color-mix(in srgb, var(--bg-warm) ${100-dSt.r*6}%, var(--parchment))`}}

function quizH(){qSt={c:0,s:0,d:false};return`<div class="qh"><div class="qdots" id="qDots">${QZ.map((_,i)=>`<div class="qd ${i===0?'cur':''}"></div>`).join('')}</div><div class="qsc">Score: <span id="qSc">0</span>/${QZ.length}</div></div><div id="qB">${qqH()}</div>`}
function qqH(){const q=QZ[qSt.c];if(!q)return`<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:14px">🏆</div><div style="font-family:var(--f-display);font-size:24px;font-weight:500;color:var(--kumkum)">Complete!</div><div style="font-size:15px;color:var(--text2);margin-top:8px">${qSt.s} of ${QZ.length}</div><button class="dice-btn" style="margin-top:20px" onclick="go('quiz')">Try again</button></div>`;
return`<div class="qqc as"><div class="qcat">${q.cat}</div><div class="qq">${q.q}</div></div><div class="qopts" id="qO">${q.o.map((o,i)=>`<button class="qo au d${i+1}" onclick="ansQ(${i})">${o}</button>`).join('')}</div><div class="qexp" id="qE">${q.ex}</div><button class="qnxt" id="qN" onclick="nxtQ()">Next →</button>`}
function ansQ(i){if(qSt.d)return;qSt.d=true;const q=QZ[qSt.c];document.querySelectorAll('.qo').forEach((o,j)=>{if(j===q.a)o.classList.add('ok');if(j===i&&i!==q.a)o.classList.add('no');o.style.pointerEvents='none'});if(i===q.a)qSt.s++;document.getElementById('qSc').textContent=qSt.s;document.getElementById('qE').classList.add('vis');document.getElementById('qN').classList.add('vis');if(audioOn)speak(q.ex);const dots=document.querySelectorAll('.qd');dots[qSt.c].classList.remove('cur');dots[qSt.c].classList.add(i===q.a?'ok':'no');if(qSt.c+1<QZ.length)dots[qSt.c+1].classList.add('cur')}
function nxtQ(){qSt.c++;qSt.d=false;document.getElementById('qB').innerHTML=qqH()}

function moreH(){const items=[{i:'🕉️',l:'Bhagavad Gita',d:'18 chapters of wisdom',p:'gita'},{i:'🎲',l:'The Dice Game',d:'Live through the Sabha Parva',p:'dice'},{i:'🌳',l:'Dynasty Tree',d:'The Kuru family lineage',p:'dynasty'},{i:'💀',l:'Yaksha Prashna',d:'Answer the riddles, save your brothers',p:'yaksha'},{i:'✨',l:'Divine Weapons',d:'Astras and celestial arms',p:'astras'},{i:'🎯',l:'Quiz',d:'Test your knowledge',p:'quiz'},{i:'📿',l:'Sacred Verses',d:'Shlokas with audio',p:'shloka'}];
const isIos=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isAndroid=/android/.test(navigator.userAgent.toLowerCase());
const isInstalled=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
let installHtml='';
if(!isInstalled){
  if(isIos){
    installHtml=`<div class="card" style="border-color:var(--kumkum);border-width:1px"><div class="more-row"><div class="more-ic" style="background:var(--kumkum)"><span style="font-size:22px;filter:brightness(10)">🪷</span></div><div><div class="more-lb">Install this app</div><div class="more-ds" style="line-height:1.5;margin-top:4px">Tap the <strong>Share</strong> button (box with arrow) at the bottom of Safari, then tap <strong>"Add to Home Screen"</strong></div></div></div></div>`;
  } else if(isAndroid){
    installHtml=`<div class="card" style="border-color:var(--kumkum);border-width:1px" onclick="if(deferredPrompt){installApp()}"><div class="more-row"><div class="more-ic" style="background:var(--kumkum)"><span style="font-size:22px;filter:brightness(10)">🪷</span></div><div><div class="more-lb">Install this app</div><div class="more-ds" style="line-height:1.5;margin-top:4px">${deferredPrompt?'Tap here to install':'Tap the <strong>⋮ menu</strong> in Chrome → <strong>"Install app"</strong> or <strong>"Add to Home screen"</strong>'}</div></div></div></div>`;
  } else {
    installHtml=`<div class="card" style="border-color:var(--kumkum);border-width:1px" onclick="if(deferredPrompt){installApp()}"><div class="more-row"><div class="more-ic" style="background:var(--kumkum)"><span style="font-size:22px;filter:brightness(10)">🪷</span></div><div><div class="more-lb">Install this app</div><div class="more-ds" style="line-height:1.5;margin-top:4px">${deferredPrompt?'Tap here to install':'Look for the install icon (⊕) in your browser\'s address bar'}</div></div></div></div>`;
  }
}return`<div class="sec-t au">Explore more</div>${lotus}<div class="sec-s au d1">Interactive experiences, encyclopedias, and daily wisdom.</div>
${installHtml}
${items.map((it,i)=>`<div class="card rv" style="transition-delay:${i*.06}s" onclick="go('${it.p}')"><div class="more-row"><div class="more-ic">${it.i}</div><div><div class="more-lb">${it.l}</div><div class="more-ds">${it.d}</div></div><span class="more-arr">→</span></div></div>`).join('')}<div style="height:20px"></div>`}

function astrasH(){return`<div class="sec-s">Celestial weapons wielded by gods and warriors.</div>
${AS.map((a,i)=>`<div class="card rv" style="transition-delay:${i*.05}s"><div class="astra-row"><div class="astra-orb">${a.icon}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px"><div class="astra-nm">${a.nm}</div><button class="abtn" style="width:24px;height:24px;font-size:9px" onclick="event.stopPropagation();speak('${a.nm}. ${a.d.substring(0,80).replace(/'/g,"\\'")}')">🔊</button></div><div class="astra-orig">${a.orig}</div><div class="astra-d">${a.d}</div><span class="tier-b tier-${a.tier}">${a.tier}</span></div></div></div>`).join('')}<div style="height:20px"></div>`}

function shlokaH(){return`<div class="sec-s">Sacred verses with audio narration.</div>
${SH.map((s,i)=>`<div class="rv" style="transition-delay:${i*.08}s;margin-bottom:16px"><div class="shloka-c"><div class="shloka-lb">${s.src}</div><div class="shloka-sk">${s.sk}</div><div class="shloka-tr">"${s.tr}"</div><div class="shloka-src">${s.src}</div><div style="font-size:12px;color:rgba(255,255,255,0.45);line-height:1.6;margin-top:12px;text-align:left;position:relative">${s.ctx}</div>
<div class="shloka-btns"><button class="abtn" onclick="event.stopPropagation();speakSk(\`${s.sk}\`)">🔊</button><button class="abtn" onclick="event.stopPropagation();speak('${s.tr.replace(/'/g,"\\'")}')">🗣️</button></div></div></div>`).join('')}<div style="height:20px"></div>`}

// Install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  showInstallBtn();
});

function showInstallBtn(){
  if(document.getElementById('installBar'))return;
  const bar=document.createElement('div');bar.id='installBar';
  bar.style.cssText='position:fixed;bottom:calc(var(--nav-h) + 8px);left:12px;right:12px;max-width:456px;margin:0 auto;padding:14px 18px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;display:flex;align-items:center;gap:12px;z-index:300;box-shadow:0 8px 30px rgba(44,36,24,0.12);animation:fadeUp 0.5s var(--ease) both';
  bar.innerHTML=`
    <div style="width:40px;height:40px;border-radius:10px;background:var(--kumkum);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">🪷</div>
    <div style="flex:1"><div style="font-family:var(--f-display);font-size:14px;font-weight:500;color:var(--text)">Install app</div><div style="font-size:11px;color:var(--text3);margin-top:1px">Add to home screen</div></div>
    <button onclick="installApp()" style="padding:8px 18px;background:var(--kumkum);color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f-body)">Install</button>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--text4);font-size:18px;cursor:pointer;padding:4px">×</button>`;
  document.body.appendChild(bar);
}

async function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
  }
  const bar=document.getElementById('installBar');if(bar)bar.remove();
}

window.addEventListener('appinstalled',()=>{
  const bar=document.getElementById('installBar');if(bar)bar.remove();
  deferredPrompt=null;
});

// ===== INIT =====
window.addEventListener('DOMContentLoaded',()=>{
  if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');
  if('speechSynthesis' in window)try{speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}catch(e){}
  go('home');
  setTimeout(()=>{try{if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{})}catch(e){}},2000);
});
</script>
