<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mahabharata — The Living Epic</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C84B31">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mahābhārata">
<meta name="application-name" content="Mahābhārata">
<meta name="description" content="Explore the greatest epic ever told — read all 18 parvas, meet 29 heroes, play interactive games.">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F5F0;--bg-warm:#FDFBF7;--bg-card:#FFFFFF;--bg-card-alt:#FBF9F5;
  --parchment:#EDE7DC;--stone:#D6CFC4;
  --earth:#6B5744;--earth-light:#8B7355;--earth-pale:#C4B49E;
  --kumkum:#C84B31;--kumkum-light:#E07050;--kumkum-pale:rgba(200,75,49,0.08);--kumkum-glow:rgba(200,75,49,0.12);
  --gold:#B8860B;--gold-light:#D4A020;--gold-pale:rgba(184,134,11,0.08);
  --nila:#1E3A4A;--tulasi:#4A7B5A;--rakta:#8B3A3A;--jamun:#5A4570;
  --text:#2C2418;--text2:#5C4A3A;--text3:#9E8F7F;--text4:#C4B8A8;
  --border:#E2DCD2;--border-h:rgba(200,75,49,0.2);
  --f-display:'Cormorant Garamond',Georgia,serif;
  --f-body:'Inter',-apple-system,sans-serif;
  --f-sk:'Tiro Devanagari Hindi',serif;
  --nav-h:64px;
  --ease:cubic-bezier(0.25,1,0.5,1);--ease-s:cubic-bezier(0.34,1.56,0.64,1)
}
[data-theme="dark"]{
  --bg:#1C1814;--bg-warm:#201C17;--bg-card:#282220;--bg-card-alt:#2E2824;
  --parchment:#302A24;--stone:#3A342E;
  --earth-light:#A08A70;--earth-pale:#5A4E42;
  --kumkum-light:#E08060;--kumkum-pale:rgba(200,75,49,0.12);
  --gold-light:#E0B830;--gold-pale:rgba(184,134,11,0.12);
  --text:#E0D8CC;--text2:#B0A494;--text3:#7A6E60;--text4:#4A4238;
  --border:#3A342C;--border-h:rgba(200,75,49,0.25)
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--f-body);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0}

#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg)}

.topbar{height:50px;display:flex;align-items:center;padding:0 20px;z-index:200;flex-shrink:0;background:var(--bg);border-bottom:0.5px solid var(--border)}
.topbar.clear{background:transparent;border:none;position:absolute;top:0;left:0;right:0}
.topbar-title{font-family:var(--f-display);font-size:16px;font-weight:500;color:var(--earth);flex:1;text-align:center;letter-spacing:0.03em}
.tb{width:34px;height:34px;border:none;background:none;border-radius:50%;color:var(--text3);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.tb:active{background:var(--parchment)}
.tb.hidden{opacity:0;pointer-events:none}

.page-wrap{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;transform:translateY(12px);transition:opacity 0.6s var(--ease),transform 0.6s var(--ease);pointer-events:none;scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.active{opacity:1;transform:none;pointer-events:auto;z-index:10}
.page.exit{opacity:0;transform:translateX(-20px);pointer-events:none}

.bnav{height:var(--nav-h);display:flex;align-items:stretch;background:var(--bg-warm);border-top:0.5px solid var(--border);flex-shrink:0;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-i{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text4);cursor:pointer;font-family:var(--f-body);transition:color 0.3s;position:relative}
.bnav-i svg{width:20px;height:20px;transition:transform 0.3s var(--ease-s)}
.bnav-i .nl{font-size:10px;font-weight:500;letter-spacing:0.02em}
.bnav-i.on{color:var(--kumkum)}
.bnav-i.on svg{transform:scale(1.08)}
.bnav-i.on::after{content:'';position:absolute;bottom:calc(100% - 1px);left:30%;right:30%;height:2px;background:var(--kumkum);border-radius:0 0 1px 1px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:none}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.au{animation:fadeUp 0.7s var(--ease) both}
.as{animation:scaleIn 0.6s var(--ease) both}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}.d6{animation-delay:.6s}.d7{animation-delay:.7s}.d8{animation-delay:.8s}
.rv{opacity:0;transform:translateY(14px);transition:opacity 0.7s var(--ease),transform 0.7s var(--ease)}.rv.vis{opacity:1;transform:none}

.sec-t{padding:28px 24px 8px;font-family:var(--f-display);font-size:21px;font-weight:500;color:var(--text);letter-spacing:0.02em}
.sec-s{padding:0 24px 18px;font-size:13px;color:var(--text2);line-height:1.7}

.lotus{display:flex;align-items:center;justify-content:center;gap:0;padding:8px 0;opacity:0.4}
.lotus svg{width:40px;height:16px}

.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;padding:18px;margin:0 20px 12px;cursor:pointer;transition:all 0.35s var(--ease)}
.card:active{transform:scale(0.98);border-color:var(--border-h)}

.pill-r{display:flex;gap:8px;padding:0 20px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px}.pill-r::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:8px 18px;border-radius:24px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.3s;font-family:var(--f-body)}
.pill.on{background:var(--kumkum);color:#fff;border-color:var(--kumkum)}

.tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.03em}
.tag-pandava{background:rgba(30,58,74,0.08);color:var(--nila)}
.tag-kaurava{background:rgba(139,58,58,0.08);color:var(--rakta)}
.tag-divine{background:var(--gold-pale);color:var(--gold)}
.tag-neutral{background:rgba(74,123,90,0.08);color:var(--tulasi)}
.tag-sage{background:rgba(90,69,112,0.08);color:var(--jamun)}
[data-theme="dark"] .tag-pandava{background:rgba(30,58,74,0.25);color:#6AA8C0}
[data-theme="dark"] .tag-kaurava{background:rgba(139,58,58,0.25);color:#C07070}
[data-theme="dark"] .tag-divine{background:rgba(184,134,11,0.2);color:var(--gold-light)}
[data-theme="dark"] .tag-neutral{background:rgba(74,123,90,0.2);color:#70B080}
[data-theme="dark"] .tag-sage{background:rgba(90,69,112,0.2);color:#A080C0}

.abtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--kumkum);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;font-size:13px;flex-shrink:0}
.abtn:active{transform:scale(0.9)}
.abtn.playing{background:var(--kumkum);color:#fff;border-color:var(--kumkum)}

.home-hero{position:relative;padding:60px 28px 40px;text-align:center;overflow:hidden;background:var(--bg-warm)}
.home-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--bg))}
.hero-motif{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:280px;opacity:0.04}
.hero-sk{font-family:var(--f-sk);font-size:26px;color:var(--gold);position:relative;animation:fadeUp 1s 0.2s var(--ease) both}
.hero-title{font-family:var(--f-display);font-size:38px;font-weight:500;color:var(--text);letter-spacing:0.04em;margin:10px 0 6px;position:relative;animation:fadeUp 1s 0.4s var(--ease) both}
.hero-sub{font-size:11px;color:var(--text3);letter-spacing:0.2em;text-transform:uppercase;position:relative;animation:fadeUp 1s 0.6s var(--ease) both}
.hero-stats{display:flex;justify-content:center;gap:36px;margin-top:28px;position:relative;animation:fadeUp 1s 0.9s var(--ease) both}
.hs-n{font-family:var(--f-display);font-size:26px;font-weight:600;color:var(--kumkum)}
.hs-l{font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}

.hgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 20px;margin-bottom:20px}
.hgi{background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;padding:20px 16px;cursor:pointer;transition:all 0.35s var(--ease);text-align:center}
.hgi:active{transform:scale(0.96);border-color:var(--border-h)}
.hgi-icon{font-size:28px;margin-bottom:8px;display:block}
.hgi-label{font-family:var(--f-display);font-size:15px;font-weight:500;color:var(--text)}
.hgi-desc{font-size:11px;color:var(--text3);margin-top:3px}

.fb{margin:0 20px 20px;border-radius:16px;overflow:hidden;cursor:pointer;background:var(--bg-card);border:0.5px solid var(--border);transition:all 0.35s}
.fb:active{transform:scale(0.98)}
.fb-inner{padding:22px;position:relative;border-left:3px solid var(--kumkum)}
.fb-eye{font-size:10px;color:var(--kumkum);letter-spacing:0.1em;text-transform:uppercase;font-weight:600}
.fb-title{font-family:var(--f-display);font-size:20px;font-weight:600;color:var(--text);margin:6px 0}
.fb-desc{font-size:12px;color:var(--text2);line-height:1.6}
.fb-cta{display:inline-block;margin-top:12px;padding:9px 22px;background:var(--kumkum);color:#fff;border-radius:24px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(--f-body)}

.shloka-c{margin:0 20px;border-radius:16px;padding:28px 24px;text-align:center;position:relative;overflow:hidden;background:var(--nila);border:none}
.shloka-c::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:rgba(184,134,11,0.06)}
.shloka-lb{font-size:10px;color:var(--gold-light);letter-spacing:0.14em;text-transform:uppercase;font-weight:600;position:relative}
.shloka-sk{font-family:var(--f-sk);font-size:20px;color:var(--gold-light);line-height:1.6;margin:18px 0;position:relative}
.shloka-tr{font-family:var(--f-display);font-size:15px;color:rgba(255,255,255,0.75);line-height:1.7;font-style:italic;margin-bottom:14px;position:relative}
.shloka-src{font-size:12px;color:rgba(255,255,255,0.35);position:relative}
.shloka-btns{display:flex;justify-content:center;gap:10px;margin-top:16px;position:relative}
.shloka-btns .abtn{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--gold-light)}

.char-row{display:flex;gap:14px;align-items:center}
.char-av{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:20px;font-weight:600;color:#fff;flex-shrink:0}
.char-nm{font-family:var(--f-display);font-size:16px;font-weight:500;color:var(--text)}
.char-ep{font-size:11px;color:var(--text3);margin:2px 0 5px}

.cd-hero{height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cd-av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:34px;font-weight:600;color:#fff;position:relative;z-index:2;animation:scaleIn 0.5s var(--ease) both}
.cd-nm{font-family:var(--f-display);font-size:26px;font-weight:500;color:var(--text);margin-top:10px;position:relative;z-index:2;animation:fadeUp 0.6s 0.15s var(--ease) both}
.cd-ep{font-size:12px;color:var(--text3);margin-top:3px;position:relative;z-index:2;animation:fadeUp 0.6s 0.3s var(--ease) both}
.cd-body{padding:24px}
.cd-sec{margin-bottom:22px}
.cd-sec h3{font-family:var(--f-display);font-size:17px;font-weight:500;margin-bottom:8px;color:var(--kumkum)}
.cd-sec p{font-size:13px;color:var(--text2);line-height:1.8}
.sk-row{display:flex;align-items:center;gap:10px}
.sk-lb{width:60px;font-size:11px;color:var(--text3);text-transform:capitalize}
.sk-track{flex:1;height:3px;background:var(--parchment);border-radius:2px;overflow:hidden}
.sk-fill{height:100%;border-radius:2px;transition:width 0.8s var(--ease);background:var(--kumkum)}
.sk-fill.lo{background:var(--earth-pale)}
.sk-val{font-size:12px;font-weight:500;color:var(--earth);width:20px;text-align:right}

.pv-timeline{padding:0 20px 24px;position:relative}
.pv-line{position:absolute;left:27px;top:0;bottom:0;width:1px;background:var(--border)}
.pv-item{position:relative;padding-left:38px;margin-bottom:16px}
.pv-dot{position:absolute;left:22px;top:20px;width:12px;height:12px;border-radius:50%;background:var(--bg);border:2px solid var(--kumkum);z-index:2;transition:all 0.3s}
.pv-item:active .pv-dot{background:var(--kumkum)}
.pv-inner{background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;padding:16px;transition:all 0.3s;cursor:pointer}
.pv-inner:active{border-color:var(--border-h)}
.pv-num{font-family:var(--f-display);font-size:12px;color:var(--kumkum);font-weight:600}
.pv-name{font-family:var(--f-display);font-size:18px;font-weight:500;color:var(--text);margin:2px 0}
.pv-mean{font-size:12px;color:var(--earth-light);font-style:italic;margin-bottom:6px}
.pv-desc{font-size:12px;color:var(--text2);line-height:1.6}
.pv-meta{display:flex;gap:14px;margin-top:8px}
.pv-meta span{font-size:11px;color:var(--text3)}
.pv-go{margin-top:8px;font-size:11px;color:var(--kumkum);font-weight:500}

.wdays{display:flex;gap:6px;padding:0 20px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px}.wdays::-webkit-scrollbar{display:none}
.wd{flex-shrink:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.3s;font-family:var(--f-body)}
.wd.on{background:var(--rakta);color:#fff;border-color:var(--rakta);transform:scale(1.08)}
.wd.has{border-color:var(--rakta);color:var(--text2)}

.str-box{margin:0 20px 16px;padding:14px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px}
.str-lb{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.str-r{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.str-s{font-size:11px;font-weight:600;width:60px}
.str-s.p{color:var(--nila)}.str-s.k{color:var(--rakta)}
.str-tk{flex:1;height:6px;background:var(--parchment);border-radius:3px;overflow:hidden}
.str-fl{height:100%;border-radius:3px;transition:width 0.8s var(--ease)}
.str-fl.pf{background:var(--nila)}.str-fl.kf{background:var(--rakta)}
.str-pct{font-size:11px;color:var(--text3);width:32px;text-align:right}

.we{margin:0 20px 12px;padding:14px;background:var(--bg-card);border-left:3px solid var(--rakta);border-radius:0 12px 12px 0;border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
.we-t{font-size:10px;color:var(--rakta);font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.we-ti{font-family:var(--f-display);font-size:16px;font-weight:500;margin:4px 0;color:var(--text)}
.we-d{font-size:12px;color:var(--text2);line-height:1.6}

.gch{margin:0 20px 10px;padding:14px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all 0.3s}
.gch:active{transform:scale(0.98)}
.gn{width:38px;height:38px;border-radius:50%;background:var(--kumkum);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:15px;font-weight:600;flex-shrink:0}
.gcn{font-family:var(--f-display);font-size:14px;font-weight:500;color:var(--text)}
.gcs{font-family:var(--f-sk);font-size:13px;color:var(--gold);margin:2px 0}
.gcd{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gcv{font-size:11px;color:var(--text3);margin-top:3px}

.dice-scene{min-height:100%;display:flex;flex-direction:column;align-items:center;padding:60px 24px 40px;position:relative;overflow:hidden;background:var(--bg-warm);transition:background 1s}
.dice-atm{font-size:14px;color:var(--earth-light);text-align:center;line-height:1.8;font-family:var(--f-display);font-style:italic;animation:fadeIn 1.5s both}
.dice-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;margin:20px 0;text-align:center;animation:scaleIn 0.6s 0.3s var(--ease) both}
.dice-rnd{font-size:10px;color:var(--kumkum);letter-spacing:0.1em;text-transform:uppercase;font-weight:600}
.dice-stk{font-family:var(--f-display);font-size:22px;color:var(--text);font-weight:500;margin:8px 0}
.dice-sub{font-size:12px;color:var(--text3)}
.dice-area{display:flex;gap:16px;margin:20px 0}
.die{width:60px;height:60px;background:var(--parchment);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--earth);font-family:var(--f-display);border:1px solid var(--border);transition:transform 0.3s}
.die.roll{animation:droll 0.5s ease}
@keyframes droll{0%{transform:rotateX(0) scale(1)}50%{transform:rotateX(180deg) scale(1.08)}100%{transform:rotateX(360deg) scale(1)}}
.dice-btn{padding:14px 40px;background:var(--kumkum);color:#fff;border:none;border-radius:28px;font-family:var(--f-display);font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s}
.dice-btn:active{transform:scale(0.95)}.dice-btn:disabled{opacity:0.3}
.dice-dlg{margin-top:20px;padding:16px;background:var(--bg-card);border-left:2px solid var(--gold);border-radius:0 10px 10px 0;width:100%;animation:fadeUp 0.5s var(--ease) both}
.dice-sp{font-size:10px;color:var(--gold);font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.dice-qt{font-family:var(--f-display);font-size:15px;color:var(--text2);line-height:1.7;margin-top:6px;font-style:italic}
.dice-lost{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.dice-lt{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(139,58,58,0.08);color:var(--rakta);border:0.5px solid rgba(139,58,58,0.15);animation:scaleIn 0.4s var(--ease-s) both}

.qh{text-align:center;padding:20px}
.qdots{display:flex;gap:5px;justify-content:center;margin-bottom:12px}
.qd{width:9px;height:9px;border-radius:50%;background:var(--border);transition:all 0.3s var(--ease-s)}
.qd.ok{background:var(--tulasi)}.qd.no{background:var(--rakta)}.qd.cur{background:var(--kumkum);transform:scale(1.3)}
.qsc{font-family:var(--f-display);font-size:20px;font-weight:600;color:var(--kumkum)}
.qqc{margin:0 20px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:16px}
.qcat{font-size:10px;color:var(--kumkum);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.qq{font-family:var(--f-display);font-size:18px;font-weight:500;color:var(--text);line-height:1.4}
.qopts{padding:0 20px;display:flex;flex-direction:column;gap:10px}
.qo{padding:14px 16px;background:var(--bg-card);border:1.5px solid var(--border);border-radius:12px;font-size:14px;color:var(--text);cursor:pointer;transition:all 0.3s;font-family:var(--f-body);text-align:left;width:100%}
.qo:active{transform:scale(0.98)}
.qo.ok{background:rgba(74,123,90,0.08);border-color:var(--tulasi);color:var(--tulasi)}
.qo.no{background:rgba(139,58,58,0.08);border-color:var(--rakta);color:var(--rakta)}
.qexp{margin:14px 20px;padding:14px;background:var(--bg-card-alt);border-radius:12px;font-size:12px;color:var(--text2);line-height:1.7;border:0.5px solid var(--border);display:none}
.qexp.vis{display:block;animation:fadeUp 0.4s var(--ease)}
.qnxt{display:none;margin:16px auto;padding:12px 32px;background:var(--kumkum);color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--f-body)}
.qnxt.vis{display:block;animation:scaleIn 0.4s var(--ease-s)}

.astra-row{display:flex;gap:12px;align-items:flex-start}
.astra-orb{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--parchment)}
.astra-nm{font-family:var(--f-display);font-size:16px;font-weight:500;color:var(--text)}
.astra-orig{font-size:11px;color:var(--gold);font-weight:500;margin:2px 0 5px}
.astra-d{font-size:12px;color:var(--text2);line-height:1.6}
.tier-b{display:inline-block;padding:3px 10px;border-radius:12px;font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-top:6px}
.tier-supreme{background:var(--gold-pale);color:var(--gold);border:0.5px solid rgba(184,134,11,0.2)}
.tier-divine{background:rgba(90,69,112,0.08);color:var(--jamun);border:0.5px solid rgba(90,69,112,0.15)}
.tier-celestial{background:rgba(30,58,74,0.08);color:var(--nila);border:0.5px solid rgba(30,58,74,0.15)}

.more-row{display:flex;gap:14px;align-items:center}
.more-ic{width:44px;height:44px;border-radius:12px;background:var(--parchment);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.more-lb{font-family:var(--f-display);font-size:15px;font-weight:500;color:var(--text)}
.more-ds{font-size:12px;color:var(--text3);margin-top:2px}
.more-arr{margin-left:auto;color:var(--text4);font-size:16px}

.search-bar{padding:10px 20px;position:sticky;top:0;z-index:50;background:var(--bg)}
.search-in{width:100%;padding:10px 16px 10px 38px;border:1px solid var(--border);border-radius:12px;background:var(--bg-card);font-size:14px;color:var(--text);font-family:var(--f-body);outline:none;transition:border-color 0.3s}
.search-in::placeholder{color:var(--text4)}
.search-in:focus{border-color:var(--kumkum)}
.search-ico{position:absolute;left:34px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3)}

.pd-hero{padding:44px 24px 28px;text-align:center;background:var(--bg-warm);position:relative}
.pd-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,var(--bg))}
.pd-n{font-family:var(--f-display);font-size:13px;color:var(--kumkum);font-weight:600;animation:fadeUp 0.5s var(--ease) both}
.pd-name{font-family:var(--f-display);font-size:28px;font-weight:500;color:var(--text);margin:6px 0;letter-spacing:0.02em;animation:fadeUp 0.6s 0.1s var(--ease) both}
.pd-m{font-size:14px;color:var(--earth-light);font-style:italic;animation:fadeUp 0.6s 0.2s var(--ease) both}
.pd-stats{display:flex;gap:12px;justify-content:center;margin-top:16px;animation:fadeUp 0.6s 0.3s var(--ease) both}
.pd-st{background:var(--bg-card);border:0.5px solid var(--border);border-radius:10px;padding:10px 18px;text-align:center}
.pd-st-n{font-family:var(--f-display);font-size:20px;font-weight:600;color:var(--kumkum)}
.pd-st-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:1px}
.rd-wrap{padding:24px 24px 40px;max-width:100%}
.rd-progress{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.rd-prog-bar{flex:1;height:3px;background:var(--parchment);border-radius:2px;overflow:hidden}
.rd-prog-fill{height:100%;background:var(--kumkum);border-radius:2px;transition:width 0.5s var(--ease)}
.rd-prog-text{font-size:11px;color:var(--text3);white-space:nowrap}
.rd-part-label{font-size:11px;color:var(--kumkum);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.rd-part-title{font-family:var(--f-display);font-size:24px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:20px}
.rd-text{font-size:15px;color:var(--text2);line-height:2;font-family:var(--f-body)}
.rd-text p{margin-bottom:16px}
.rd-nav{display:flex;gap:12px;margin-top:32px;padding-top:20px;border-top:0.5px solid var(--border)}
.rd-nav-btn{flex:1;padding:14px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:12px;cursor:pointer;font-family:var(--f-body);font-size:13px;color:var(--text2);transition:all 0.3s;text-align:center}
.rd-nav-btn:active{transform:scale(0.97);border-color:var(--border-h)}
.rd-nav-btn.primary{background:var(--kumkum);color:#fff;border-color:var(--kumkum)}
.rd-nav-btn.disabled{opacity:0.3;pointer-events:none}
.rd-read-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:var(--kumkum);color:#fff;border:none;border-radius:14px;font-family:var(--f-display);font-size:17px;font-weight:500;cursor:pointer;transition:all 0.3s;letter-spacing:0.02em;margin-bottom:20px}
.rd-read-btn:active{transform:scale(0.97)}

.tree-wrap{padding:12px 0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tree-wrap svg{display:block;margin:0 auto}
.tree-wrap svg text{font-family:var(--f-body);fill:var(--text)}
.tree-node{cursor:pointer;transition:opacity 0.3s}
.tree-node:active{opacity:0.7}
.tree-info{margin:0 20px;padding:16px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;animation:fadeUp 0.4s var(--ease) both}
.tree-info-name{font-family:var(--f-display);font-size:18px;font-weight:500;color:var(--text);margin-bottom:4px}
.tree-info-desc{font-size:12px;color:var(--text2);line-height:1.6}

.yk-scene{min-height:100%;padding:40px 24px;position:relative;background:var(--bg-warm)}
.yk-lake{text-align:center;margin:20px 0;padding:24px;background:linear-gradient(180deg,rgba(30,58,74,0.05) 0%,rgba(30,58,74,0.12) 100%);border-radius:20px;border:0.5px solid rgba(30,58,74,0.1)}
.yk-brothers{display:flex;justify-content:center;gap:8px;margin:16px 0}
.yk-bro{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:14px;font-weight:600;color:#fff;transition:all 0.5s var(--ease)}
.yk-bro.fallen{opacity:0.2;transform:scale(0.7)}
.yk-bro.revived{animation:scaleIn 0.5s var(--ease-s) both;box-shadow:0 0 12px rgba(74,123,90,0.3)}
.yk-riddle{margin:20px 0;padding:22px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:16px}
.yk-q{font-family:var(--f-display);font-size:18px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:16px}
.yk-opts{display:flex;flex-direction:column;gap:8px}
.yk-opt{padding:12px 16px;background:var(--bg-card-alt);border:1.5px solid var(--border);border-radius:12px;font-size:13px;color:var(--text);cursor:pointer;transition:all 0.3s;font-family:var(--f-body);text-align:left;width:100%}
.yk-opt:active{transform:scale(0.98)}
.yk-opt.right{background:rgba(74,123,90,0.1);border-color:var(--tulasi);color:var(--tulasi)}
.yk-opt.wrong{background:rgba(139,58,58,0.08);border-color:var(--rakta);color:var(--rakta)}
.yk-result{text-align:center;padding:20px;margin-top:16px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;display:none}
.yk-result.vis{display:block;animation:fadeUp 0.5s var(--ease) both}
.yk-narr{font-family:var(--f-display);font-size:14px;color:var(--text2);line-height:1.7;font-style:italic;margin:16px 0;padding:14px;border-left:2px solid var(--gold);background:var(--gold-pale);border-radius:0 10px 10px 0}
</style>

<script>
// ===== DATA =====
const C=[
{id:'arjuna',n:'Arjuna',sk:'अर्जुन',ep:'Dhananjaya · Partha · Savyasachi',f:'pandava',c:'#1E3A4A',pa:'Kunti & Indra',gu:'Drona, Parashurama',w:['Gandiva','Pashupatastra','Brahmashira'],bio:'The third Pandava and the greatest archer of his age. Son of Indra by Kunti. His skill with the bow was unmatched — he could shoot in complete darkness, fight ambidextrously, and wield celestial weapons. His bond with Krishna forms the emotional and philosophical core of the epic.',mo:['Won Draupadi at her swayamvara','Obtained Pashupatastra from Shiva','Burned the Khandava forest with Krishna','Hesitated before war — received the Bhagavad Gita','Killed Karna on Day 17'],sk2:{archery:10,mace:6,sword:7,astra:9,strategy:7}},
{id:'karna',n:'Karna',sk:'कर्ण',ep:'Radheya · Vasusena · Angaraja',f:'kaurava',c:'#C84B31',pa:'Kunti & Surya',gu:'Parashurama',w:['Vijaya bow','Shakti of Indra','Bhargavastra'],bio:'Born to Kunti and the Sun god before her marriage, abandoned at birth, raised by a charioteer. The greatest tragic hero — blessed with divine armor, cursed by his teacher, betrayed by fate at every turn, yet never wavering in loyalty to Duryodhana.',mo:['Humiliated at the tournament','Befriended by Duryodhana','Gave away divine armor to Indra','Used Shakti on Ghatotkacha instead of Arjuna','Killed by Arjuna when his chariot wheel sank'],sk2:{archery:10,mace:7,sword:6,astra:8,strategy:6}},
{id:'krishna',n:'Krishna',sk:'कृष्ण',ep:'Vasudeva · Govinda · Keshava',f:'divine',c:'#1E3A4A',pa:'Devaki & Vasudeva',gu:'Sandipani',w:['Sudarshana Chakra','Kaumodaki mace'],bio:'The eighth avatar of Vishnu, king of Dwaraka, supreme strategist. Chose to be Arjuna\'s charioteer. His discourse became the Bhagavad Gita — 700 verses that changed the world.',mo:['Failed peace mission','Revealed Vishvarupa to Arjuna','Protected Arjuna throughout the war','Orchestrated Jayadratha\'s death','Cursed by Gandhari'],sk2:{archery:8,mace:9,sword:7,astra:10,strategy:10}},
{id:'bhishma',n:'Bhishma',sk:'भीष्म',ep:'Devavrata · Gangaputra · Pitamaha',f:'neutral',c:'#4A7B5A',pa:'Shantanu & Ganga',gu:'Parashurama',w:['Prabhasa bow','All celestial astras'],bio:'The grandsire. Took the terrible oath of lifelong celibacy. Blessed with Iccha Mrityu. Perhaps the most powerful warrior on the field, yet fought with deliberate restraint.',mo:['Took the terrible oath','Fought for 10 days as commander','Revealed how to defeat him','Fell on the bed of arrows','Waited for Uttarayana'],sk2:{archery:9,mace:8,sword:9,astra:10,strategy:9}},
{id:'draupadi',n:'Draupadi',sk:'द्रौपदी',ep:'Panchali · Krishnaa · Yajnaseni',f:'pandava',c:'#8B3A3A',pa:'Born from sacred fire',gu:'—',w:[],bio:'Born from sacrificial fire, married to all five Pandavas. Her humiliation in the Kaurava court set the war in motion. Her unanswered question remains the deepest dharmic puzzle of the epic.',mo:['Born from the sacred fire','Married all five Pandavas','Humiliated in court','Vowed hair unbound until washed in blood','Hair finally bound after the war'],sk2:{archery:2,mace:1,sword:1,astra:0,strategy:8}},
{id:'yudhishthira',n:'Yudhishthira',sk:'युधिष्ठिर',ep:'Dharmaraja · Ajatashatru',f:'pandava',c:'#5A4570',pa:'Kunti & Dharma',gu:'Drona',w:['Spear of Dharma'],bio:'The eldest Pandava, son of Dharma. His chariot floated above the ground because he had never told a lie. Yet gambling lost him everything, and his one half-lie caused it to touch earth.',mo:['Lost everything in the dice game','Answered the Yaksha\'s riddles','Ruled incognito in Virata','Told the half-lie about Ashwatthama','Only Pandava to reach heaven in mortal form'],sk2:{archery:6,mace:5,sword:5,astra:6,strategy:8}},
{id:'bhima',n:'Bhima',sk:'भीम',ep:'Vrikodara · Bhimasena',f:'pandava',c:'#6B5744',pa:'Kunti & Vayu',gu:'Drona, Balarama',w:['Mace','Bare hands'],bio:'Son of the wind god. Strength of ten thousand elephants. He swore to drink Duhshasana\'s blood and break Duryodhana\'s thigh — and fulfilled both vows.',mo:['Killed demon Hidimba','Killed Bakasura','Swore to avenge Draupadi','Killed all 100 Kauravas','Broke Duryodhana\'s thigh'],sk2:{archery:4,mace:10,sword:6,astra:3,strategy:5}},
{id:'drona',n:'Drona',sk:'द्रोण',ep:'Dronacharya · Bharadwaja\'s son',f:'kaurava',c:'#5C4A3A',pa:'Sage Bharadwaja',gu:'Parashurama',w:['Brahmastra','All astras'],bio:'Supreme teacher of both Pandavas and Kauravas. A Brahmin warrior who commanded the Kaurava army after Bhishma. His attachment to his son was his only weakness.',mo:['Demanded Ekalavya\'s thumb','Trained both sides','Created Chakravyuha that killed Abhimanyu','Laid down arms on hearing of Ashwatthama'],sk2:{archery:9,mace:6,sword:7,astra:10,strategy:8}},
{id:'duryodhana',n:'Duryodhana',sk:'दुर्योधन',ep:'Suyodhana · King of Hastinapura',f:'kaurava',c:'#8B3A3A',pa:'Dhritarashtra & Gandhari',gu:'Drona, Balarama',w:['Mace'],bio:'The eldest Kaurava — generous to allies, fierce mace fighter, consumed by envy. His friendship with Karna was genuine. The epic\'s most complex antagonist.',mo:['Orchestrated the dice game','Refused five villages for peace','Led Kaurava cause through the war','Died after Bhima broke his thigh'],sk2:{archery:5,mace:9,sword:6,astra:4,strategy:6}},
{id:'abhimanyu',n:'Abhimanyu',sk:'अभिमन्यु',ep:'Son of Arjuna & Subhadra',f:'pandava',c:'#1E3A4A',pa:'Arjuna & Subhadra',gu:'Arjuna, Krishna',w:['Bow','Sword','Chariot wheel'],bio:'Learned the Chakravyuha entry in his mother\'s womb but never the exit. Killed at 16 by six maharathis — the epic\'s most heartbreaking moment.',mo:['Learned Chakravyuha in the womb','Entered the formation on Day 13','Fought six maharathis alone','His death unleashed Arjuna\'s fury'],sk2:{archery:8,mace:5,sword:7,astra:6,strategy:5}},
{id:'nakula',n:'Nakula',sk:'नकुल',ep:'Son of the Ashwini twins',f:'pandava',c:'#4A7B5A',pa:'Madri & the Ashwini Kumaras',gu:'Drona',w:['Sword'],bio:'Fourth Pandava, twin of Sahadeva. The most handsome man alive and the finest swordsman among the brothers. Skilled with horses. Chosen by Yudhishthira at the Yaksha\'s lake over Bhima and Arjuna — out of fairness to Madri.',mo:['Disguised as horse-trainer Granthika in Virata','Revived by Yudhishthira at the Yaksha\'s lake','Fought through all 18 days of war','Fell second-last on the walk to heaven — pride in beauty'],sk2:{archery:6,mace:5,sword:8,astra:4,strategy:5}},
{id:'sahadeva',n:'Sahadeva',sk:'सहदेव',ep:'Wisest of the Pandavas',f:'pandava',c:'#4A7B5A',pa:'Madri & the Ashwini Kumaras',gu:'Drona',w:['Sword'],bio:'Fifth Pandava, twin of Nakula. The wisest of the brothers, gifted with knowledge of the past, present, and future. He knew the war was coming but was cursed to remain silent about it. Killed Shakuni on Day 18.',mo:['Knew the future but was cursed to silence','Disguised as cowherd Tantripala in Virata','Killed Shakuni — architect of the dice game','Fell on the walk to heaven — pride in wisdom'],sk2:{archery:5,mace:5,sword:7,astra:4,strategy:7}},
{id:'gandhari',n:'Gandhari',sk:'गान्धारी',ep:'The Blindfolded Queen',f:'kaurava',c:'#5A4570',pa:'King Subala of Gandhara',gu:'—',w:[],bio:'Princess of Gandhara, married to the blind king Dhritarashtra. She blindfolded herself to share his condition — an act of both devotion and protest. Mother of 100 Kauravas. Her curse on Krishna after the war came true in every detail.',mo:['Blindfolded herself upon marriage','Bore 100 sons from a mass of flesh','Could not stop the dice game','Cursed Krishna — "Your clan will destroy itself"','Her curse fulfilled 36 years later'],sk2:{archery:0,mace:0,sword:0,astra:0,strategy:6}},
{id:'kunti',n:'Kunti',sk:'कुन्ती',ep:'Mother of the Pandavas',f:'pandava',c:'#8B3A3A',pa:'King Kuntibhoja (adopted)',gu:'Sage Durvasa',w:[],bio:'The woman who carried more secrets than anyone in the epic. As a girl, she tested Durvasa\'s boon and bore Karna by the Sun god — then abandoned him. She invoked three more gods to give the Pandavas divine fathers. She revealed the truth about Karna only after the war.',mo:['Bore Karna and abandoned him','Invoked gods for the five Pandavas','Shared exile with her sons','Revealed Karna\'s identity after the war','Chose to die in the forest fire'],sk2:{archery:0,mace:0,sword:0,astra:0,strategy:7}},
{id:'shakuni',n:'Shakuni',sk:'शकुनि',ep:'The Master of Dice',f:'kaurava',c:'#5C4A3A',pa:'King Subala of Gandhara',gu:'—',w:['Dice carved from his father\'s bones'],bio:'Gandhari\'s brother and the mastermind behind the dice game. His dice, carved from his own father\'s bones, always obeyed his command. His entire life was devoted to destroying the Kuru dynasty from within — revenge for the forced marriage of his sister to a blind king.',mo:['Engineered the dice game with loaded dice','Manipulated Duryodhana throughout','His dice were carved from his father\'s bones','Killed by Sahadeva on Day 18'],sk2:{archery:2,mace:2,sword:3,astra:0,strategy:10}},
{id:'dhritarashtra',n:'Dhritarashtra',sk:'धृतराष्ट्र',ep:'The Blind King',f:'kaurava',c:'#5C4A3A',pa:'Vyasa & Ambika',gu:'Bhishma',w:[],bio:'Born blind, denied the throne for his disability, consumed by love for his sons and paralyzed by that love. Every tragedy of the epic traces back to his inability to discipline Duryodhana. He knew what was right but could never act on it.',mo:['Denied the throne due to blindness','Failed to stop the dice game','Could not restrain Duryodhana','Tried to crush Bhima — hugged iron statue','Died in the forest fire with Gandhari'],sk2:{archery:0,mace:3,sword:2,astra:0,strategy:4}},
{id:'vidura',n:'Vidura',sk:'विदुर',ep:'The Voice of Dharma',f:'neutral',c:'#4A7B5A',pa:'Vyasa & a palace maid',gu:'—',w:[],bio:'Half-brother of Dhritarashtra and Pandu, son of Vyasa. An incarnation of Dharma himself. The wisest advisor in the court, he was the only one who consistently spoke against the injustice of the dice game. His counsel was ignored at every turn.',mo:['Protested during the dice game','Counseled Dhritarashtra (Vidura Niti)','Warned the Pandavas about the house of lac','Retired to the forest','His soul merged with Yudhishthira at death'],sk2:{archery:3,mace:2,sword:3,astra:0,strategy:10}},
{id:'ashwatthama',n:'Ashwatthama',sk:'अश्वत्थामा',ep:'The Immortal Cursed',f:'kaurava',c:'#5C4A3A',pa:'Drona & Kripi',gu:'Drona',w:['Brahmastra','Narayanastra'],bio:'Son of Drona, born with a divine jewel in his forehead. His father\'s death drove him to madness. He massacred the sleeping Pandava camp and launched the Brahmastra at an unborn child. Cursed to wander the earth for 3,000 years with festering wounds.',mo:['Born with divine jewel in forehead','Night massacre of the sleeping camp','Killed Draupadi\'s five sons','Brahmastra at Uttara\'s womb','Cursed to 3,000 years of wandering'],sk2:{archery:8,mace:5,sword:6,astra:9,strategy:4}},
{id:'ghatotkacha',n:'Ghatotkacha',sk:'घटोत्कच',ep:'The Demon Prince',f:'pandava',c:'#6B5744',pa:'Bhima & Hidimbi',gu:'—',w:['Demon powers','Illusion magic'],bio:'Son of Bhima and the rakshasi Hidimbi. A shape-shifting demon warrior who fought for the Pandavas. His night rampage on Day 14 was so devastating that Karna was forced to use the Shakti — the weapon he had saved for Arjuna — to kill him.',mo:['Born to Bhima and the demoness Hidimbi','Fought for the Pandavas in the war','Night rampage devastated Kaurava army','Forced Karna to use the Shakti','His death saved Arjuna\'s life'],sk2:{archery:5,mace:7,sword:5,astra:3,strategy:4}},
{id:'shikhandi',n:'Shikhandi',sk:'शिखण्डी',ep:'The Instrument of Bhishma\'s Fall',f:'pandava',c:'#1E3A4A',pa:'King Drupada',gu:'—',w:['Bow'],bio:'Born as Amba, a princess Bhishma abducted. She spent a lifetime seeking revenge and was reborn as Shikhandi. Bhishma refused to fight someone he considered a woman. On Day 10, Arjuna fired from behind Shikhandi, and the grandsire fell.',mo:['Previously born as Amba','Reborn to destroy Bhishma','Placed before Arjuna as a shield','Bhishma refused to fight — and fell','Killed in the night massacre by Ashwatthama'],sk2:{archery:6,mace:4,sword:5,astra:3,strategy:5}},
{id:'ekalavya',n:'Ekalavya',sk:'एकलव्य',ep:'The Self-Taught Archer',f:'neutral',c:'#6B5744',pa:'Hiranyadhanus (Nishada chief)',gu:'Self-taught (Drona\'s clay idol)',w:['Bow'],bio:'A tribal boy who taught himself archery by practicing before a clay statue of Drona. When his skill rivaled Arjuna\'s, Drona demanded his right thumb as guru-dakshina. Ekalavya cut it off without hesitation. The most controversial act of the epic — merit destroyed by caste.',mo:['Built a clay idol of Drona','Taught himself to match Arjuna','Silenced a dog with arrows — without harming it','Gave his thumb as guru-dakshina','Could never shoot the same way again'],sk2:{archery:9,mace:3,sword:3,astra:0,strategy:4}},
{id:'jayadratha',n:'Jayadratha',sk:'जयद्रथ',ep:'King of Sindhu',f:'kaurava',c:'#8B3A3A',pa:'King Vriddhakshatra',gu:'—',w:['Bow','Boon of Shiva'],bio:'King of Sindhu, married to the sole Kaurava daughter Duhsala. Once tried to abduct Draupadi. On Day 13, empowered by Shiva\'s boon, he single-handedly held the Chakravyuha entrance shut — sealing Abhimanyu\'s doom.',mo:['Attempted to abduct Draupadi','Held shut the Chakravyuha entrance','Sealed Abhimanyu\'s fate','Killed by Arjuna via the false sunset','His head guided to his father\'s lap'],sk2:{archery:6,mace:5,sword:5,astra:4,strategy:5}},
{id:'duhshasana',n:'Duhshasana',sk:'दुःशासन',ep:'The Hand That Dragged',f:'kaurava',c:'#8B3A3A',pa:'Dhritarashtra & Gandhari',gu:'Drona',w:['Mace','Sword'],bio:'Second of the 100 Kauravas. The man who physically dragged Draupadi by her hair into the court and attempted to disrobe her. Bhima swore to drink his blood — and on Day 16, he ripped Duhshasana open and fulfilled his oath.',mo:['Dragged Draupadi by her hair','Attempted to disrobe her in court','Fought in the war for all 18 days','Killed by Bhima on Day 16','Bhima drank his blood — oath fulfilled'],sk2:{archery:5,mace:6,sword:6,astra:3,strategy:3}},
{id:'vyasa',n:'Vyasa',sk:'व्यास',ep:'The Author Within the Story',f:'sage',c:'#5A4570',pa:'Parashara & Satyavati',gu:'—',w:[],bio:'The sage who authored the Mahabharata — and appears as a character within it. He is Satyavati\'s son, father of Dhritarashtra, Pandu, and Vidura, and grandfather of both the Pandavas and Kauravas. He divided the Vedas, composed the epic, and dictated it to Ganesha.',mo:['Born to Parashara and Satyavati','Divided the Vedas into four','Fathered Dhritarashtra, Pandu, Vidura','Authored the Mahabharata itself','Appears throughout as guide and witness'],sk2:{archery:3,mace:2,sword:2,astra:8,strategy:10}},
{id:'satyavati',n:'Satyavati',sk:'सत्यवती',ep:'The Fisherman\'s Daughter Who Made Kings',f:'neutral',c:'#8B3A3A',pa:'Fisherman chief Dasharaja',gu:'—',w:[],bio:'A fisherman\'s daughter whose beauty caught King Shantanu\'s eye. Her father\'s condition for the marriage — that her sons inherit the throne — led to Bhishma\'s terrible oath. She was the mother of Vyasa and the grandmother of the entire Kuru dynasty\'s later generations.',mo:['Union with Parashara — bore Vyasa','Married Shantanu after Bhishma\'s oath','Her sons died young — called Vyasa','Set the niyoga that produced the next generation','Retired to the forest in old age'],sk2:{archery:0,mace:0,sword:0,astra:0,strategy:8}},
{id:'balarama',n:'Balarama',sk:'बलराम',ep:'The Elder Brother of Krishna',f:'divine',c:'#4A7B5A',pa:'Devaki & Vasudeva',gu:'—',w:['Plough (Hala)','Mace (Kaumodaki)'],bio:'Krishna\'s elder brother, avatar of Shesha Naga. The greatest mace fighter alive — he trained both Bhima and Duryodhana. Remained neutral in the war because he had students on both sides. Condemned Bhima\'s illegal blow in the final duel.',mo:['Trained both Bhima and Duryodhana in mace','Refused to fight in the war — stayed neutral','Went on pilgrimage during the 18 days','Condemned Bhima\'s foul blow','Departed through yoga before Krishna\'s death'],sk2:{archery:5,mace:10,sword:6,astra:5,strategy:6}},
{id:'shalya',n:'Shalya',sk:'शल्य',ep:'The Reluctant Enemy',f:'kaurava',c:'#5C4A3A',pa:'King of Madra',gu:'—',w:['Spear','Mace'],bio:'King of Madra, uncle of Nakula and Sahadeva. He set out to fight for the Pandavas but Duryodhana tricked him with hospitality, binding him by honor to the Kaurava side. Served as Karna\'s charioteer — deliberately demoralizing him.',mo:['Tricked into fighting for Kauravas','Served as Karna\'s charioteer on Day 17','Deliberately demoralized Karna','Became last Kaurava commander on Day 18','Killed by Yudhishthira'],sk2:{archery:6,mace:7,sword:6,astra:5,strategy:5}},
{id:'parashurama',n:'Parashurama',sk:'परशुराम',ep:'The Warrior Sage',f:'sage',c:'#5A4570',pa:'Sage Jamadagni & Renuka',gu:'Lord Shiva',w:['Parashu (axe)','All astras'],bio:'The sixth avatar of Vishnu. A Brahmin who mastered all weapons. He cleansed the earth of Kshatriyas twenty-one times. Teacher of both Bhishma and Karna. He cursed Karna for lying about his caste — a curse that proved fatal on Day 17.',mo:['Destroyed the Kshatriya race 21 times','Trained Bhishma in warfare','Trained Karna — then cursed him for lying','Gave the Vijaya bow to Karna','His curse triggered on Day 17'],sk2:{archery:10,mace:8,sword:9,astra:10,strategy:8}},
{id:'barbarik',n:'Barbarik',sk:'बर्बरीक',ep:'The Three-Arrow Warrior',f:'neutral',c:'#6B5744',pa:'Ghatotkacha & Maurvi',gu:'Lord Shiva',w:['Three infallible arrows'],bio:'Grandson of Bhima, blessed with three arrows that could destroy anything. He vowed to fight for whichever side was losing — which meant he would keep switching sides until everyone was dead. Krishna asked for his head as a sacrifice before the war.',mo:['Possessed three arrows that could end any war','Vowed to fight for the losing side','Krishna realized this would destroy both armies','Gave his head willingly to Krishna','His head watched the entire war from a hilltop'],sk2:{archery:10,mace:4,sword:4,astra:10,strategy:3}},
];

1:{full:'The Adi Parva lays the foundation — Shantanu, Bhishma\'s oath, the births of Pandavas and Kauravas, Drona\'s training, and the kingdom divided.',ev:['Bhishma\'s oath of celibacy','Birth of Pandavas and Kauravas','Drona becomes teacher','Ekalavya\'s thumb','Draupadi\'s swayamvara','Indraprastha established'],ch:['Bhishma','Kunti','Drona','Karna','Draupadi'],th:['Duty vs desire','The price of oaths','Caste and merit'],st:[
{t:'The Story of Shakuntala',d:'King Dushyanta meets Shakuntala in the forest. They marry by Gandharva rites, but a sage\'s curse makes him forget her. Only their son Bharata — after whom India (Bharatavarsha) is named — reunites them.',moral:'Love, memory, and the power of truth'},
{t:'The Story of Yayati',d:'King Yayati, cursed with old age, asks his sons to exchange their youth for his. Only his youngest, Puru, agrees. Yayati eventually realizes desire is never satisfied by indulgence — only by renunciation.',moral:'The insatiability of desire'},
{t:'The Story of Devayani and Kacha',d:'Devayani, daughter of the guru Shukracharya, falls in love with Kacha, a student sent by the gods. Kacha learns the secret of revival but refuses her love, leading to mutual curses.',moral:'Duty over personal desire'},
{t:'Bhishma\'s Oath',d:'Young Devavrata renounces the throne and vows lifelong celibacy so his father Shantanu can marry Satyavati. The gods shower flowers and name him Bhishma — "the terrible oath-taker."',moral:'Sacrifice for a parent\'s happiness'},
{t:'The House of Lac',d:'Duryodhana builds a palace of wax and lacquer for the Pandavas, planning to burn them alive. Vidura warns them. They escape through a secret tunnel, and the world believes them dead.',moral:'Cunning vs treachery'},

2:{full:'The turning point. Yudhishthira gambles away everything. Draupadi\'s disrobing and unanswered question set the war in motion.',ev:['The dice game begins','Yudhishthira loses everything','Draupadi dragged to court','Krishna\'s miracle','13 years exile decreed'],ch:['Yudhishthira','Draupadi','Shakuni','Duryodhana'],th:['Addiction and weakness','Justice denied','Vengeance born'],st:[
{t:'The Maya Sabha',d:'The demon architect Maya builds a magical palace at Indraprastha. Its crystal floors look like water and its pools look like floors. When Duryodhana visits, he falls into a pool — and Draupadi laughs. This humiliation festers into the desire for total revenge.',moral:'Pride wounded becomes rage'},
{t:'Draupadi\'s Disrobing',d:'After being staked and lost, Draupadi is dragged by her hair into the court. Duhshasana tries to strip her. She prays to Krishna, and her sari becomes infinite. No one in the court of elders intervenes. Her question — did Yudhishthira have the right? — goes unanswered.',moral:'The silence of good men enables evil'},
]},
3:{full:'Twelve years in exile. Arjuna obtains divine weapons. Contains the epic\'s most famous nested stories.',ev:['Arjuna vs Shiva — the Kirata episode','Nala and Damayanti','Savitri conquers Death','Yaksha Prashna — riddles at the lake'],ch:['Arjuna','Yudhishthira','Bhima','Savitri'],th:['Patience','Love conquering death','Growth through adversity'],st:[
{t:'Nala and Damayanti',d:'King Nala wins the beautiful Damayanti at her swayamvara, even over the gods who desired her. But Nala loses his kingdom to gambling (mirroring Yudhishthira) and is separated from Damayanti. Through years of suffering and perseverance, they are reunited.',moral:'Love endures all trials'},
{t:'Savitri and Satyavan',d:'Savitri knowingly marries Satyavan despite being told he will die in one year. When Yama, the god of death, comes for his soul, Savitri follows him and through her wisdom and devotion, wins back her husband\'s life. She is the only mortal to defeat Death through argument alone.',moral:'Devotion and wisdom conquer even death'},
{t:'The Yaksha Prashna',d:'A yaksha (nature spirit) poisons a lake. The Pandava brothers come one by one to drink — each ignores the yaksha\'s questions and falls dead. Only Yudhishthira answers: "What is the greatest wonder?" — "Each day death strikes, yet the living believe themselves immortal." He chooses to revive Nakula over Bhima or Arjuna, showing his commitment to dharma.',moral:'Wisdom and righteousness over strength'},
{t:'The Kirata and Arjuna',d:'Arjuna performs severe penance to obtain Shiva\'s weapon. Shiva appears disguised as a tribal hunter (Kirata). They fight over a boar they both shot. After a fierce battle, Arjuna realizes his opponent is Shiva himself and bows. Pleased, Shiva grants him the Pashupatastra.',moral:'True power comes from humility before the divine'},
{t:'Rishyashringa',d:'A young sage raised in complete isolation by his father has never seen a woman. A kingdom suffering drought sends courtesans to lure him out, knowing his presence brings rain. His innocence and the moral complexity of using it is debated.',moral:'Innocence exploited by necessity'},
{t:'The Story of Rama (Brief)',d:'Markandeya narrates a condensed version of the Ramayana to the Pandavas during their exile, drawing parallels between Rama\'s exile and theirs, offering hope that righteousness eventually triumphs.',moral:'Dharma triumphs in the end'},
]},
4:{full:'The year of disguise in Virata\'s court. Arjuna reveals himself by defeating the Kaurava army alone.',ev:['Pandavas take disguises','Kichaka killed by Bhima','Arjuna reveals himself'],ch:['Arjuna','Bhima','Draupadi'],th:['Identity and disguise','Patience before storm'],st:[

{t:'Vidura Niti',d:'Vidura counsels Dhritarashtra through the night before war, sharing profound wisdom on governance, ethics, and the duties of a king. His teachings — covering justice, friendship, enemies, and the nature of wise conduct — form one of the epic\'s great philosophical passages.',moral:'Wisdom offered to deaf ears'},

{t:'The Bhagavad Gita',d:'700 verses across 18 chapters. Arjuna refuses to fight. Krishna reveals the nature of the soul, duty, action, devotion, and the cosmos. He shows his terrifying Vishvarupa — the universal form containing all of creation and destruction. The most important philosophical text in the epic and one of the most influential works in world literature.',moral:'Act without attachment; the soul is eternal'},
]},
7:{full:'Abhimanyu enters the Chakravyuha alone and dies. Arjuna\'s oath. The half-lie destroys Drona.',ev:['Abhimanyu killed in Chakravyuha','Arjuna\'s oath to kill Jayadratha','Krishna\'s false sunset','The half-lie: Ashwatthama hathi'],ch:['Abhimanyu','Arjuna','Drona'],th:['Death of innocence','Cost of truth'],st:[
{t:'Abhimanyu in the Chakravyuha',d:'The 16-year-old son of Arjuna enters the deadly spiral formation alone. He fights like a lion — defeating warriors twice his age. When his weapons break, he fights with a chariot wheel. Six maharathis surround him and attack simultaneously, violating every rule of war. His death is the emotional turning point of the entire war.',moral:'Courage beyond measure; rules of war mean nothing to the desperate'},
{t:'The False Sunset',d:'Arjuna swears to kill Jayadratha before sunset or immolate himself. Krishna creates an illusion — clouds cover the sun, darkness falls. Jayadratha emerges, believing himself safe. Krishna clears the sky. The real sun is still visible. Arjuna fires. The most brilliant stratagem of the war.',moral:'Even divine intervention serves the arc of justice'},
